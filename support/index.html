<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Centre d'aide CHR Solution — guides, FAQ et support.">
<title>CHR Solution — Help Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* Palette CHR Solution — alignée sur l'app (brun sidebar, crème fond, doré boutons) */
    --navy:#2C2019;            /* brun foncé (remplace le navy, utilisé comme couleur dominante) */
    --navy-dark:#1F1611;       /* brun très foncé */
    --teal:#00A6A6;            /* conservé pour accents favoris */
    --teal-dark:#008080;
    --teal-soft:#E5EFE8;       /* teintes vertes très douces pour cat-icon, badges favoris */
    --sand:#FAF5EC;            /* fond principal crème chaud */
    --paper:#ffffff;
    --ink:#2A231C;             /* texte marron foncé au lieu de gris */
    --muted:#7A6C5E;           /* gris marron moyen */
    --soft:#B4A79A;
    --line:#E8DFD2;            /* lignes teinte crème */
    --line-soft:#F2EADF;
    --brown:#8B5A3C;
    --gold:#D4A017;
    --gold-soft:#F5E0B0;       /* fond boutons style CHR */
    --gold-dark:#6F4E0F;       /* texte boutons style CHR */
    --green:#16A34A; --red:#DC2626;
    --shadow:0 1px 2px rgba(44,32,25,.04),0 1px 3px rgba(44,32,25,.06);
    --shadow-lg:0 10px 30px rgba(44,32,25,.08),0 4px 10px rgba(44,32,25,.05);
    --radius:14px; --radius-sm:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Barlow',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--sand); color:var(--ink);
    font-size:16px; line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  a{color:var(--teal-dark);text-decoration:none}
  a:hover{text-decoration:underline}
  h1,h2,h3,h4{font-family:'Barlow',sans-serif;color:var(--navy);line-height:1.25;margin:0 0 .6em}
  h1{font-size:2.2rem;font-weight:700;letter-spacing:-.01em}
  h2{font-size:1.45rem;font-weight:600;margin-top:2rem}
  h3{font-size:1.1rem;font-weight:600;margin-top:1.5rem}
  p{margin:0 0 1em}
  code{background:#F3F4F6;border:1px solid var(--line);padding:.08em .4em;border-radius:6px;font-size:.9em;font-family:'JetBrains Mono',Consolas,monospace}
  hr{border:0;border-top:1px solid var(--line);margin:2rem 0}

  /* ===== Inline icons (SVG uniformes) ===== */
  .ico{display:inline-block;vertical-align:-3px;line-height:0}
  .ico svg{width:1em;height:1em;display:inline-block;vertical-align:middle}
  .ico-lg svg{width:1.2em;height:1.2em}
  .ico-grid svg circle{fill:currentColor}

  /* ===== Hero (palette CHR : brun profond + touche dorée) ===== */
  .hero{
    background:linear-gradient(135deg,var(--navy) 0%,#3A2B20 70%,#231912 100%);
    color:#fff;padding:44px 28px 80px;text-align:center;
    position:relative;z-index:10;
    border-bottom:3px solid var(--gold);
  }
  .hero::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 80% 30%,rgba(212,160,23,.2),transparent 50%),radial-gradient(circle at 20% 70%,rgba(139,90,60,.25),transparent 45%);
    pointer-events:none;
  }
  .hero-inner{max-width:780px;margin:0 auto;position:relative}
  .hero .eyebrow{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-soft);font-weight:600;margin-bottom:8px}
  .hero h1{color:#fff;font-size:2.2rem;margin-bottom:.4em;font-weight:700;font-style:italic;letter-spacing:-.01em}
  .hero p{color:#E6D3B9;font-size:1.05rem;margin-bottom:26px}

  /* Compact hero — visible sur toutes les pages pour garder la recherche */
  .hero.compact{padding:14px 20px 16px;text-align:left;border-bottom:2px solid var(--teal)}
  .hero.compact .eyebrow,.hero.compact h1,.hero.compact p{display:none}
  .hero.compact .hero-inner{max-width:1180px;display:flex;align-items:center;gap:16px}
  .hero.compact .back-home{color:#fff;font-weight:600;font-size:.92rem;white-space:nowrap;display:inline-flex;align-items:center;gap:8px;cursor:pointer;padding:6px 12px;border-radius:8px}
  .hero.compact .back-home:hover{background:rgba(255,255,255,.08);text-decoration:none}
  .hero.compact .search-wrap{margin:0;flex:1;max-width:none}
  .hero.compact .search-wrap input{padding:11px 18px 11px 44px;font-size:.92rem;box-shadow:0 2px 6px rgba(0,0,0,.12)}
  .hero.compact .search-wrap .search-icon{left:14px;width:16px;height:16px}
  .hero.compact .lang-switcher{margin-top:0}
  .back-home{display:none}
  .hero.compact .back-home{display:inline-flex}

  /* Langue switch */
  .lang-switcher{
    position:absolute;top:16px;right:20px;
    display:inline-flex;align-items:center;gap:4px;
    background:rgba(0,0,0,.25);border-radius:20px;padding:4px;
    backdrop-filter:blur(10px);
  }
  .lang-switcher button{
    background:none;border:0;color:#fff;cursor:pointer;
    padding:4px 10px;border-radius:16px;font-size:.82rem;font-weight:600;
    font-family:inherit;display:inline-flex;align-items:center;gap:6px;
    opacity:.6;transition:all .15s ease;
  }
  .lang-switcher button.active{background:rgba(255,255,255,.2);opacity:1}
  .lang-switcher button:hover{opacity:1}
  .lang-switcher .flag{font-size:1rem;line-height:1}
  .hero.compact .lang-switcher{position:static;margin-left:auto;flex-shrink:0}

  /* Search */
  .search-wrap{position:relative;margin:0 auto;max-width:640px}
  .search-wrap input{
    width:100%;font-family:'Barlow',sans-serif;font-size:1rem;
    padding:16px 20px 16px 52px;border:none;border-radius:12px;
    background:#fff;color:var(--ink);
    box-shadow:0 12px 40px rgba(0,0,0,.22);outline:none;
  }
  .search-wrap input:focus{box-shadow:0 0 0 3px rgba(0,166,166,.35),0 12px 40px rgba(0,0,0,.22)}
  .search-wrap .search-icon{
    position:absolute;left:18px;top:50%;transform:translateY(-50%);
    color:var(--muted);width:20px;height:20px;pointer-events:none;
  }
  .search-results{
    position:absolute;top:calc(100% + 8px);left:0;right:0;background:#fff;
    border-radius:12px;box-shadow:var(--shadow-lg);overflow:hidden;
    max-height:420px;overflow-y:auto;text-align:left;display:none;z-index:1000;
  }
  .search-results.open{display:block}
  .search-results .item{display:block;padding:12px 18px;border-bottom:1px solid var(--line-soft);color:var(--ink)}
  .search-results .item:hover{background:var(--sand);text-decoration:none}
  .search-results .item strong{color:var(--navy);display:block;font-weight:600;margin-bottom:2px}
  .search-results .item span{color:var(--muted);font-size:.88rem}
  .search-results .empty{padding:18px;color:var(--muted);text-align:center}

  /* Main container */
  .container{max-width:1180px;margin:0 auto;padding:28px;position:relative}
  .container.overlap{margin-top:-48px;z-index:5}

  /* Category grid */
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-bottom:44px}
  .cat-card{
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);
    padding:24px 22px;box-shadow:var(--shadow);display:block;color:inherit;
    transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease;
  }
  .cat-card:hover{text-decoration:none;transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--teal)}
  .cat-icon{
    width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    margin-bottom:12px;font-size:1.3rem;
  }
  .cat-icon.teal{background:var(--teal-soft);color:var(--teal-dark)}
  .cat-icon.navy{background:#E4ECF5;color:var(--navy)}
  .cat-icon.gold{background:#FBEFCB;color:#9A7A0F}
  .cat-icon.brown{background:#F2E6DB;color:var(--brown)}
  .cat-icon.green{background:#DCFCE7;color:#166534}
  .cat-icon.red{background:#FEE2E2;color:#991B1B}
  .cat-icon.purple{background:#EDE9FE;color:#5B21B6}
  .cat-card h3{color:var(--navy);margin:0 0 6px;font-size:1.08rem}
  .cat-card p{color:var(--muted);font-size:.92rem;margin:0 0 14px;line-height:1.5}
  .cat-card .count{font-size:.8rem;color:var(--teal-dark);font-weight:600}

  /* Category page */
  .cat-header{margin-bottom:24px}
  .breadcrumb{font-size:.85rem;color:var(--muted);margin-bottom:12px}
  .breadcrumb a{color:var(--muted)}
  .breadcrumb a:hover{color:var(--teal-dark)}
  .breadcrumb .sep{margin:0 6px;color:var(--soft)}
  .cat-header h1{margin:0 0 8px}
  .cat-header p{color:var(--muted);font-size:1rem;max-width:720px}
  .article-list{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  .article-list a{display:flex;padding:16px 20px;gap:14px;align-items:flex-start;border-bottom:1px solid var(--line-soft);color:inherit}
  .article-list a:last-child{border-bottom:none}
  .article-list a:hover{background:var(--sand);text-decoration:none}
  .article-list .art-num{flex-shrink:0;width:30px;height:30px;border-radius:8px;background:var(--teal-soft);color:var(--teal-dark);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.85rem}
  .article-list .art-body strong{color:var(--navy);font-size:1rem;font-weight:600;display:block;margin-bottom:3px}
  .article-list .art-body p{color:var(--muted);font-size:.9rem;margin:0}
  .article-list .art-arrow{margin-left:auto;color:var(--soft);font-size:1.4rem;align-self:center}

  /* Article page */
  .article-layout{display:grid;grid-template-columns:240px 1fr;gap:32px;align-items:flex-start}
  .side-nav{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);position:sticky;top:20px}
  .side-nav h4{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px;font-weight:600}
  .side-nav ul{list-style:none;padding:0;margin:0}
  .side-nav li{margin-bottom:2px}
  .side-nav a{display:block;padding:7px 10px;color:var(--ink);font-size:.9rem;border-radius:6px;border-left:2px solid transparent}
  .side-nav a:hover{background:var(--sand);text-decoration:none}
  .side-nav a.active{background:var(--teal-soft);color:var(--teal-dark);font-weight:600;border-left-color:var(--teal)}
  .article{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:36px 44px;box-shadow:var(--shadow)}
  .article h1{margin:0 0 8px;font-size:1.9rem}
  .article .meta{color:var(--muted);font-size:.88rem;margin-bottom:24px;display:flex;gap:16px;flex-wrap:wrap}
  .article .meta span{display:inline-flex;align-items:center;gap:6px}
  .article h2{border-top:1px solid var(--line);padding-top:1.6rem;margin-top:2.2rem}
  .article h2:first-of-type{border-top:none;padding-top:0}
  .article ul,.article ol{padding-left:22px;margin:0 0 1.2em}
  .article li{margin-bottom:.4em}
  .article .lead{font-size:1.06rem;color:var(--muted);margin-bottom:1.6em;border-left:3px solid var(--teal);padding-left:16px}

  /* Callouts */
  .callout{border-radius:10px;padding:14px 18px;margin:1.2em 0;display:flex;gap:12px;align-items:flex-start;font-size:.94rem}
  .callout.info{background:#E7F3F7;border:1px solid #B5D9E6;color:#0C4A6E}
  .callout.info strong{color:#075985}
  .callout.tip{background:#ECFDF5;border:1px solid #A7F3D0;color:#064E3B}
  .callout.tip strong{color:#065F46}
  .callout.warn{background:#FFF7ED;border:1px solid #FED7AA;color:#7C2D12}
  .callout.warn strong{color:#9A3412}
  .callout.danger{background:#FEF2F2;border:1px solid #FECACA;color:#7F1D1D}
  .callout.danger strong{color:#991B1B}
  .callout p{margin:0}
  .callout p + p{margin-top:.4em}

  /* Related */
  .related{margin-top:40px;border-top:1px solid var(--line);padding-top:24px}
  .related h4{color:var(--muted);font-size:.76rem;text-transform:uppercase;letter-spacing:.08em;margin:0 0 12px;font-weight:600}
  .related-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px}
  .related-grid a{display:block;padding:12px 14px;background:var(--sand);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-size:.9rem;line-height:1.4}
  .related-grid a:hover{border-color:var(--teal);background:#fff;text-decoration:none}
  .related-grid strong{color:var(--navy);font-weight:600}

  /* Badges */
  .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.7rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;vertical-align:middle}
  .badge.soon{background:#FBEFCB;color:#9A7A0F}
  .badge.new{background:#DCFCE7;color:#166534}
  .badge.admin{background:#FEE2E2;color:#991B1B}

  /* Contact CTA — teinte crème/doré */
  .contact-cta{margin-top:36px;background:linear-gradient(135deg,#FBF5E7 0%,var(--gold-soft) 100%);border:1px solid #E5C76B;border-radius:var(--radius);padding:24px 28px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
  .contact-cta h3{margin:0 0 4px;color:var(--navy);font-size:1.05rem}
  .contact-cta p{margin:0;color:var(--muted);font-size:.92rem}
  .btn{display:inline-block;padding:10px 20px;background:var(--navy);color:#fff;border-radius:10px;font-weight:600;font-family:'Barlow',sans-serif;border:none;cursor:pointer;font-size:.95rem}
  .btn:hover{background:var(--navy-dark);text-decoration:none}
  .btn.outline{background:transparent;color:var(--navy);border:1.5px solid var(--navy)}
  .btn.outline:hover{background:var(--navy);color:#fff}

  /* Table */
  table.tbl{width:100%;border-collapse:collapse;margin:1.2em 0;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  table.tbl th{background:var(--teal-soft);color:var(--navy);font-weight:600;text-align:left;padding:10px 14px;font-size:.88rem}
  table.tbl td{padding:10px 14px;border-top:1px solid var(--line-soft);font-size:.92rem;vertical-align:top}

  /* UI element highlight — rendu identique aux boutons CHR app */
  .ui{display:inline-block;padding:2px 10px;background:var(--gold-soft);color:var(--gold-dark);border:1px solid #E5C76B;border-radius:6px;font-weight:600;font-size:.9em;white-space:nowrap}
  .ui .ico{margin-right:4px}

  /* ===== Mode embedded (dans popup Bubble / iframe) =====
     Le popup Bubble a déjà son titre. On transforme le hero en bandeau
     compact avec juste la barre de recherche + sélecteur de langue. */
  body.embedded .hero{
    padding:12px 20px;
    background:#fff;
    border-bottom:1px solid var(--line);
    border-bottom-width:1px;
  }
  body.embedded .hero::before{display:none}
  body.embedded .hero .eyebrow,
  body.embedded .hero h1,
  body.embedded .hero p{display:none}
  body.embedded .hero-inner{max-width:none;display:flex;align-items:center;gap:14px}
  body.embedded .hero .search-wrap{flex:1;max-width:none;margin:0}
  body.embedded .hero .search-wrap input{
    font-size:.95rem;padding:10px 16px 10px 42px;
    box-shadow:0 1px 3px rgba(44,32,25,.06);
    border:1px solid var(--line);
  }
  body.embedded .hero .search-wrap .search-icon{left:14px;width:16px;height:16px}
  body.embedded .lang-switcher{position:static;background:var(--sand);border:1px solid var(--line);flex-shrink:0}
  body.embedded .lang-switcher button{color:var(--ink)}
  body.embedded .lang-switcher button.active{background:var(--gold-soft);color:var(--gold-dark)}
  body.embedded .container.overlap{margin-top:0 !important;padding-top:28px}

  /* Responsive */
  @media (max-width:900px){
    .article-layout{grid-template-columns:1fr}
    .side-nav{position:static}
    .article{padding:28px 22px}
    .hero h1{font-size:1.8rem}
    .hero p{font-size:.95rem}
    .lang-switcher{position:static;margin:0 auto 20px}
    .hero.compact .hero-inner{flex-wrap:wrap}
  }
  @media (max-width:560px){
    .container{padding:16px}
    .hero{padding:32px 16px 70px}
    .hero.compact{padding:10px 16px}
    .article{padding:22px 16px}
  }

  /* Captcha modal — anti-spam léger avant ouverture mailto */
  .captcha-backdrop{position:fixed;inset:0;background:rgba(44,32,25,.55);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
  .captcha-backdrop.hidden{display:none}
  .captcha-modal{background:var(--sand);border:1px solid #E5C76B;border-radius:var(--radius);padding:24px 28px;max-width:400px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.25);font-family:inherit}
  .captcha-modal h3{margin:0 0 6px;color:var(--navy);font-size:1.1rem}
  .captcha-modal .hint{margin:0 0 14px;color:var(--muted);font-size:.9rem}
  .captcha-question{font-size:1.4rem;font-weight:600;color:var(--navy);text-align:center;padding:14px;background:#FBF5E7;border-radius:8px;margin-bottom:12px;user-select:none}
  .captcha-input{width:100%;box-sizing:border-box;padding:10px 14px;border:1px solid #ccc;border-radius:8px;font-size:1rem;margin-bottom:12px;font-family:inherit}
  .captcha-input:focus{outline:none;border-color:var(--gold-dark)}
  .captcha-actions{display:flex;gap:10px;justify-content:flex-end}
  .captcha-error{color:#c53030;font-size:.85rem;margin:0 0 10px;min-height:1.2em}
</style>

  <li><strong>Je crée des <em>Liste Achat</em></strong> — par fournisseur et période, en y assignant les clients concernés.</li>
  <li><strong>Je suis l'activité</strong> depuis le <em>Tableau de bord</em>.</li>
</ol>

<div class="callout info">
  <div><strong>Différence Clients / Fournisseurs :</strong> côté Achats, les <em>Fournisseurs</em> sont ceux chez qui vous achetez, les <em>Clients</em> sont ceux à qui vous revendez. L'outil fait le pont entre les deux via les <em>Liste Achat</em>.</div>
</div>
`,
    en:`
<p class="lead">Purchase Management is designed for <strong>distributors</strong>, <strong>purchasing hubs</strong> and <strong>buying groups</strong> who reference products with suppliers and offer them to their restaurant customers.</p>

<h2>Typical workflow</h2>
<ol>
  <li><strong>Build your <em>Suppliers</em> base</strong> — who supplies what, with their contact info.</li>
  <li><strong>Reference your products</strong> in <em>Purchase Product</em> — catalogue by family, with units, packs, VAT.</li>
  <li><strong>Add your customers</strong> in <em>Customers</em> — with their group and status.</li>
  <li><strong>Create <em>Purchase Lists</em></strong> — per supplier and period, assigning the relevant customers.</li>
  <li><strong>Track activity</strong> from the <em>Dashboard</em>.</li>
</ol>

<div class="callout info">
  <div><strong>Customers vs Suppliers:</strong> on the Purchase side, <em>Suppliers</em> are who you buy from, <em>Customers</em> are who you sell to. The tool bridges both via <em>Purchase Lists</em>.</div>
</div>
`
  }
},

{
  id:"pc-suppliers", cat:"purchase-mgmt", readTime:4,
  titles:{
    fr:"Gérer vos Fournisseurs",
    en:"Manage your Suppliers"
  },
  summaries:{
    fr:"Consulter, filtrer par favoris, ajouter un fournisseur.",
    en:"Browse, filter by favorites, add a supplier."
  },
  bodies:{
    fr:`
<p class="lead">La section <strong>Fournisseurs</strong> affiche votre base fournisseurs en vue cartes. Chaque carte regroupe les coordonnées principales et deux compteurs (Produit Fournisseur / Produits non gérés).</p>

<h2>Consulter la liste</h2>
<p>Au-dessus des cartes, deux onglets filtrent l'affichage :</p>
<ul>
  <li><span class="ui">Tous (n)</span> — l'ensemble des fournisseurs.</li>
  <li><span class="ui">Favoris (n)</span> — seulement ceux marqués en favori.</li>
</ul>

<h2>Marquer un fournisseur en favori</h2>
<p>Sur chaque carte, cliquez sur l'<strong>étoile</strong> en haut à droite. Elle devient jaune pleine. Les favoris sont les fournisseurs que vous consultez le plus souvent.</p>

<h2>Ajouter un fournisseur</h2>
<ol>
  <li>Cliquez sur <span class="ui">${ICO_PLUS} Ajouter</span> en haut à gauche.</li>
  <li>Renseignez les informations : nom, e-mail, téléphones, adresse, ou tout autre champ utile présent sur la page.</li>
  <li>Enregistrez.</li>
</ol>

<h2>Les informations visibles sur une carte</h2>
<ul>
  <li><strong>Nom</strong> + étoile favori.</li>
  <li>Nom(s) de contact secondaire.</li>
  <li><strong>E-mail</strong>, <strong>téléphone(s)</strong>, <strong>adresse</strong>.</li>
  <li>Compteurs <em>Produit Fournisseur</em> / <em>Produits non gérés</em>.</li>
  <li>Menu ${ICO_DOTSV} (trois points) pour les actions : éditer, supprimer.</li>
  <li>...ou tout autre champ utile présent sur la page.</li>
</ul>

<div class="callout tip">
  <div><strong>Astuce :</strong> les fournisseurs sans e-mail ni téléphone apparaissent avec les zones vides — pensez à les compléter dès que possible pour éviter les commandes bloquées.</div>
</div>
`,
    en:`
<p class="lead">The <strong>Suppliers</strong> section displays your supplier base as cards. Each card shows the main contact details and two counters (Supplier Product / Unmanaged Products).</p>

<h2>Browsing the list</h2>
<p>Above the cards, two tabs filter the view:</p>
<ul>
  <li><span class="ui">All (n)</span> — all suppliers.</li>
  <li><span class="ui">Favorites (n)</span> — only those marked as favorite.</li>
</ul>

<h2>Mark a supplier as favorite</h2>
<p>On each card, click the <strong>star</strong> at the top right. It turns solid yellow. Favorites are the suppliers you consult most often.</p>

<h2>Add a supplier</h2>
<ol>
  <li>Click <span class="ui">${ICO_PLUS} Add</span> at the top left.</li>
  <li>Fill in the info: name, email, phone numbers, address, or any other useful field on the page.</li>
  <li>Save.</li>
</ol>

<h2>Info visible on a card</h2>
<ul>
  <li><strong>Name</strong> + favorite star.</li>
  <li>Secondary contact name(s).</li>
  <li><strong>Email</strong>, <strong>phone(s)</strong>, <strong>address</strong>.</li>
  <li>Counters <em>Supplier Product</em> / <em>Unmanaged Products</em>.</li>
  <li>${ICO_DOTSV} menu (three dots) for actions: edit, delete.</li>
  <li>...or any other useful field on the page.</li>
</ul>

<div class="callout tip">
  <div><strong>Tip:</strong> suppliers without email or phone appear with empty fields — fill them in as soon as possible to avoid blocked orders.</div>
</div>
`
  }
},

{
  id:"pc-customers", cat:"purchase-mgmt", readTime:5,
  titles:{
    fr:"Gérer vos Clients",
    en:"Manage your Customers"
  },
  summaries:{
    fr:"Liste des clients, statuts Actif / Inactif, groupes, ajouter un client.",
    en:"Customer list, Active / Inactive statuses, groups, add a customer."
  },
  bodies:{
    fr:`
<p class="lead">La section <strong>Clients</strong> regroupe les établissements à qui vous vendez. Chacun peut être actif ou inactif, faire partie d'un groupe, et être abonné à Gestion de stock.</p>

<h2>Filtrer la liste</h2>
<p>Trois onglets au-dessus des cartes :</p>
<ul>
  <li><span class="ui">Tous (n)</span></li>
  <li><span class="ui">Actif (n)</span> — clients en cours</li>
  <li><span class="ui">Inactif (n)</span> — clients dormants ou anciens</li>
</ul>

<h2>Sélectionner par groupe</h2>
<p>Le dropdown <span class="ui">Sélectionner un groupe</span> restreint l'affichage à un groupe de clients précis.</p>

<h2>Ajouter un client</h2>
<ol>
  <li>Cliquez sur <span class="ui">${ICO_PLUS} Ajouter</span>.</li>
  <li>Remplissez : nom, e-mail, téléphone, adresse, date d'expiration de l'accès, ou tout autre champ utile présent sur la page.</li>
  <li>Choisissez le <strong>groupe</strong>.</li>
  <li>Enregistrez.</li>
</ol>

<h2>Les informations d'une carte client</h2>
<ul>
  <li>Nom du client + badge <span class="ui">Actif</span> ou <span class="ui">Inactif</span>.</li>
  <li>Badge <span class="ui">Gestion de stock</span> si le client a aussi le module Stock.</li>
  <li>Date d'expiration de l'accès.</li>
  <li>E-mail, téléphone, adresse.</li>
  <li>Badge groupe.</li>
  <li>Compteurs <em>Produits gérés</em> / <em>Produits non gérés</em> : combien de produits sont assignés à ce client via une Liste Achat.</li>
  <li>...ou tout autre champ utile présent sur la page.</li>
</ul>

<h2>Gérer les groupes</h2>
<p>Le bouton <span class="ui">Gérer Groupes</span> en haut ouvre une popup pour créer / renommer / supprimer les groupes. Un groupe vous permet de segmenter vos clients et d'assigner vos Liste Achat à un ensemble d'un coup.</p>

<h2>Profil « Gestionnaire Achat » côté client</h2>
<p>Dans la fiche d'un client, une case à cocher <strong>Gestionnaire Achat</strong> peut être activée. Elle accorde à ce client des droits étendus de consultation / modification sur ses propres données (liste achat, produits gérés). À utiliser pour vos gros clients autonomes qui gèrent eux-mêmes leurs références.</p>
`,
    en:`
<p class="lead">The <strong>Customers</strong> section groups the establishments you sell to. Each one can be active or inactive, belong to a group, and be subscribed to Stock Management.</p>

<h2>Filter the list</h2>
<p>Three tabs above the cards:</p>
<ul>
  <li><span class="ui">All (n)</span></li>
  <li><span class="ui">Active (n)</span> — current customers</li>
  <li><span class="ui">Inactive (n)</span> — dormant or former customers</li>
</ul>

<h2>Filter by group</h2>
<p>The <span class="ui">Select a group</span> dropdown restricts the view to a specific customer group.</p>

<h2>Add a customer</h2>
<ol>
  <li>Click <span class="ui">${ICO_PLUS} Add</span>.</li>
  <li>Fill in: name, email, phone, address, access expiration date, or any other useful field on the page.</li>
  <li>Choose the <strong>group</strong>.</li>
  <li>Save.</li>
</ol>

<h2>Info on a customer card</h2>
<ul>
  <li>Customer name + <span class="ui">Active</span> or <span class="ui">Inactive</span> badge.</li>
  <li><span class="ui">Stock Management</span> badge if the customer also has the Stock module.</li>
  <li>Access expiration date.</li>
  <li>Email, phone, address.</li>
  <li>Group badge.</li>
  <li>Counters <em>Managed products</em> / <em>Unmanaged products</em>: how many products are assigned to this customer via a Purchase List.</li>
  <li>...or any other useful field on the page.</li>
</ul>

<h2>Manage groups</h2>
<p>The <span class="ui">Manage Groups</span> button at the top opens a popup to create / rename / delete groups. A group lets you segment your customers and assign Purchase Lists to a whole set at once.</p>

<h2>"Purchase Manager" profile on customer side</h2>
<p>On a customer's card, a <strong>Purchase Manager</strong> checkbox can be enabled. It grants this customer extended rights to view / edit their own data (purchase list, managed products). Use it for your autonomous large customers who manage their references themselves.</p>
`
  }
},

{
  id:"pc-products", cat:"purchase-mgmt", readTime:6,
  titles:{
    fr:"Le catalogue Produit Achat",
    en:"The Purchase Product catalogue"
  },
  summaries:{
    fr:"Familles, groupes, unités, TVA — la colonne vertébrale de votre catalogue.",
    en:"Families, groups, units, VAT — the backbone of your catalogue."
  },
  bodies:{
    fr:`
<p class="lead">La section <strong>Produit Achat</strong> est votre catalogue central. Chaque ligne = un produit référencé avec son numéro, son unité de vente et sa TVA. Les familles s'affichent dans une sidebar à gauche du tableau.</p>

<div class="callout info">
  <div><strong>Bon à savoir :</strong> côté client (espace restaurateur), cette même page s'appelle <strong>Mercuriale</strong> et les lignes sont nommées <em>Produit Fournisseur</em>. Les données affichées sont les mêmes, la vue est simplement adaptée au consommateur du catalogue.</div>
</div>

<h2>Les familles de produits</h2>
<p>À gauche, une liste de familles avec pastilles colorées ${ICO_PALETTE} vous sert de filtre hiérarchique. <strong>Les familles sont 100 % paramétrables</strong> : vous créez les vôtres, choisissez les couleurs, définissez la hiérarchie (familles / sous-familles) via le bouton <span class="ui">Gérer Groupes</span>.</p>
<p>À titre d'exemple, une configuration typique peut regrouper : LIQUIDES, SOLIDES (avec sous-familles Cremerie, Epicerie sec, Fromages, Pain, Patisserie, Poissons, Viandes & charcuterie), HYGIENE.</p>
<p>Cliquez sur une famille pour ne voir que ses produits. Cliquez sur <span class="ui">Voir tous</span> pour lever le filtre.</p>

<h2>Les colonnes du tableau</h2>
<table class="tbl">
<thead><tr><th>Colonne</th><th>Contenu</th></tr></thead>
<tbody>
<tr><td><strong>Nr</strong></td><td>Numéro de référence interne (triable).</td></tr>
<tr><td><strong>Nom</strong></td><td>Libellé du produit.</td></tr>
<tr><td><strong>Unité</strong></td><td>Unité de référence (Kg, Pc, L, g, ml…).</td></tr>
<tr><td><strong>Pack</strong></td><td>Conditionnement standard (ex. Pack de 10).</td></tr>
<tr><td><strong>Fournisseur</strong></td><td>Nombre de fournisseurs qui proposent ce produit.</td></tr>
<tr><td><strong>TVA</strong></td><td>Taux applicable (5,5 ou 20).</td></tr>
<tr><td>${ICO_DOTSV}</td><td>Menu d'actions sur la ligne (éditer, dupliquer, supprimer).</td></tr>
</tbody>
</table>
<p>...ou toute autre colonne utile présente sur la page.</p>

<h2>Les 4 actions en haut de page</h2>
<ul>
  <li><span class="ui">${ICO_PLUS} Ajouter</span> — créer un nouveau produit.</li>
  <li><span class="ui">Gérer Groupes</span> — créer et organiser les familles et sous-familles.</li>
  <li><span class="ui">Cacher Groupe</span> — masquer la sidebar des familles (pour plus d'espace tableau).</li>
  <li><span class="ui">Gérer Unités</span> — créer et éditer les unités disponibles dans l'app.</li>
</ul>

<h2>Les actions au-dessus du tableau</h2>
<ul>
  <li><strong>Recherche</strong> — filtrage en direct sur le nom.</li>
  <li><span class="ui">Éditer</span> — active le mode édition en ligne (pour modifier plusieurs lignes d'un coup).</li>
  <li><span class="ui">${ICO_PLUS} Créer Liste Achat</span> — crée une nouvelle liste d'achat à partir des produits sélectionnés.</li>
  <li><span class="ui">Cacher Supprimés</span> — dropdown à 2 valeurs (<em>Cacher Supprimés</em> / <em>Afficher Supprimés</em>) pour inclure ou non les produits archivés.</li>
  <li>${ICO_REFRESH} <strong>Refresh</strong> — recharge les données.</li>
</ul>

<div class="callout tip">
  <div><strong>Astuce :</strong> cochez plusieurs produits dans la colonne checkbox, puis cliquez <em>${ICO_PLUS} Créer Liste Achat</em> pour générer rapidement une liste à envoyer à un client.</div>
</div>
`,
    en:`
<p class="lead">The <strong>Purchase Product</strong> section is your central catalogue. Each row = one referenced product with its number, unit and VAT. Families appear in a sidebar to the left of the table.</p>

<div class="callout info">
  <div><strong>Good to know:</strong> on the customer side (restaurateur space), this same page is called <strong>Mercuriale</strong> and rows are called <em>Supplier Product</em>. The data is the same, only the view is adapted to the catalogue consumer.</div>
</div>

<h2>Product families</h2>
<p>On the left, a list of families with coloured dots ${ICO_PALETTE} serves as a hierarchical filter. <strong>Families are fully customizable</strong>: you create your own, choose the colours, define the hierarchy (families / sub-families) via the <span class="ui">Manage Groups</span> button.</p>
<p>As an example, a typical setup might group: LIQUIDS, SOLIDS (with sub-families Dairy, Dry Goods, Cheese, Bread, Pastry, Fish, Meats & Charcuterie), HYGIENE.</p>
<p>Click a family to see only its products. Click <span class="ui">Show all</span> to clear the filter.</p>

<h2>Table columns</h2>
<table class="tbl">
<thead><tr><th>Column</th><th>Content</th></tr></thead>
<tbody>
<tr><td><strong>Nr</strong></td><td>Internal reference number (sortable).</td></tr>
<tr><td><strong>Name</strong></td><td>Product label.</td></tr>
<tr><td><strong>Unit</strong></td><td>Reference unit (Kg, Pc, L, g, ml…).</td></tr>
<tr><td><strong>Pack</strong></td><td>Standard packaging (e.g., Pack of 10).</td></tr>
<tr><td><strong>Supplier</strong></td><td>Number of suppliers offering this product.</td></tr>
<tr><td><strong>VAT</strong></td><td>Applicable rate.</td></tr>
<tr><td>${ICO_DOTSV}</td><td>Row action menu (edit, duplicate, delete).</td></tr>
</tbody>
</table>
<p>...or any other useful column present on the page.</p>

<h2>The 4 top-of-page actions</h2>
<ul>
  <li><span class="ui">${ICO_PLUS} Add</span> — create a new product.</li>
  <li><span class="ui">Manage Groups</span> — create and organize families and sub-families.</li>
  <li><span class="ui">Hide Group</span> — hide the families sidebar for more table space.</li>
  <li><span class="ui">Manage Units</span> — create and edit units available in the app.</li>
</ul>

<h2>Actions above the table</h2>
<ul>
  <li><strong>Search</strong> — live filter on name.</li>
  <li><span class="ui">Edit</span> — activate inline edit mode (to edit multiple rows at once).</li>
  <li><span class="ui">${ICO_PLUS} Create Purchase List</span> — creates a new purchase list from selected products.</li>
  <li><span class="ui">Hide Deleted</span> — 2-value dropdown (<em>Hide Deleted</em> / <em>Show Deleted</em>) to include archived products or not.</li>
  <li>${ICO_REFRESH} <strong>Refresh</strong> — reload the data.</li>
</ul>

<div class="callout tip">
  <div><strong>Tip:</strong> check multiple products in the checkbox column, then click <em>${ICO_PLUS} Create Purchase List</em> to quickly generate a list to send to a customer.</div>
</div>
`
  }
},

{
  id:"pc-add-product", cat:"purchase-mgmt", readTime:4,
  titles:{
    fr:"Ajouter un produit au catalogue",
    en:"Add a product to the catalogue"
  },
  summaries:{
    fr:"Créer une référence Produit Achat depuis zéro.",
    en:"Create a Purchase Product reference from scratch."
  },
  bodies:{
    fr:`
<p class="lead">Toutes les Liste Achat s'appuient sur le catalogue Produit Achat. Avant de faire une liste, le produit doit exister dans la base.</p>

<h2>La procédure</h2>
<ol>
  <li>Ouvrez <strong>Produit Achat</strong> dans la sidebar.</li>
  <li>Cliquez sur <span class="ui">${ICO_PLUS} Ajouter</span>.</li>
  <li>Renseignez les champs obligatoires : <em>Nom</em>, <em>Famille</em>, <em>Unité</em>, <em>TVA</em>, ou tout autre champ utile présent sur la page.</li>
  <li>Facultatif : <em>Sous-famille</em>, <em>Pack</em>, <em>Fournisseur(s)</em>, allergènes, photo.</li>
  <li>Enregistrez.</li>
</ol>

<h2>Avant de créer, vérifiez les doublons</h2>
<p>Tapez les 3-4 premières lettres du nom dans la barre de recherche. Si le produit existe déjà, éditez-le plutôt que d'en créer un autre.</p>

<div class="callout warn">
  <div><strong>Le n° (Nr)</strong> est généralement attribué automatiquement. Ne le modifiez pas si votre organisation utilise déjà une numérotation externe.</div>
</div>
`,
    en:`
<p class="lead">All Purchase Lists rely on the Purchase Product catalogue. Before creating a list, the product must exist in the database.</p>

<h2>Procedure</h2>
<ol>
  <li>Open <strong>Purchase Product</strong> from the sidebar.</li>
  <li>Click <span class="ui">${ICO_PLUS} Add</span>.</li>
  <li>Fill in required fields: <em>Name</em>, <em>Family</em>, <em>Unit</em>, <em>VAT</em>, or any other useful field on the page.</li>
  <li>Optional: <em>Sub-family</em>, <em>Pack</em>, <em>Supplier(s)</em>, allergens, photo.</li>
  <li>Save.</li>
</ol>

<h2>Check for duplicates first</h2>
<p>Type the first 3-4 letters of the name in the search bar. If the product already exists, edit it rather than creating a new one.</p>

<div class="callout warn">
  <div><strong>The Nr</strong> is usually assigned automatically. Don't modify it if your organization already uses an external numbering scheme.</div>
</div>
`
  }
},

{
  id:"pc-purchase-list", cat:"purchase-mgmt", readTime:6,
  titles:{
    fr:"Créer et gérer une Liste Achat",
    en:"Create and manage a Purchase List"
  },
  summaries:{
    fr:"La liste de prix que vous envoyez à vos clients.",
    en:"The price list you send to your customers."
  },
  bodies:{
    fr:`
<p class="lead">Une <strong>Liste Achat</strong> est une liste de produits, à un tarif, d'un fournisseur, valable sur une période, et assignée à un ou plusieurs clients. C'est le cœur de votre activité de distribution.</p>

<h2>Créer une Liste Achat</h2>
<ol>
  <li>Ouvrez <strong>Liste Achat</strong> dans la sidebar.</li>
  <li>Cliquez sur <span class="ui">${ICO_PLUS} Ajouter</span>.</li>
  <li>Choisissez le <strong>Fournisseur</strong>.</li>
  <li>Définissez la <strong>période de validité</strong> (date de début — date de fin).</li>
  <li>Choisissez le <strong>groupe client</strong>.</li>
  <li>Ajoutez les produits un par un, avec leur prix.</li>
  <li>Enregistrez.</li>
</ol>

<h2>Les colonnes de la table Liste Achat</h2>
<table class="tbl">
<thead><tr><th>Colonne</th><th>Contenu</th></tr></thead>
<tbody>
<tr><td><strong>Code</strong></td><td>Identifiant unique de la liste.</td></tr>
<tr><td><strong>Fournisseur</strong></td><td>Fournisseur concerné.</td></tr>
<tr><td><strong>Groupe</strong></td><td>Groupe de clients auxquels la liste est destinée.</td></tr>
<tr><td><strong>Date</strong></td><td>Période de validité.</td></tr>
<tr><td><strong>Lignes</strong></td><td>Nombre de produits dans la liste.</td></tr>
<tr><td><strong>Client</strong></td><td>Nombre de clients à qui la liste est assignée.</td></tr>
<tr><td>${ICO_DOTSV}</td><td>Actions : éditer, dupliquer, supprimer.</td></tr>
</tbody>
</table>
<p>...ou toute autre colonne utile présente sur la page.</p>

<h2>Les groupes de Liste Achat</h2>
<p>Dans la sidebar à gauche du tableau, les groupes (comme <strong>Commun</strong> ou <strong>GP</strong>) vous permettent de trier rapidement par type de liste. Cliquez sur <span class="ui">Voir tous</span> pour afficher toutes les listes.</p>

<div class="callout tip">
  <div><strong>Bon à savoir :</strong> pour envoyer la même liste à plusieurs clients, assignez-la à un <em>groupe client</em> plutôt qu'individuellement. Vous gagnez du temps et évitez les oublis.</div>
</div>

<h2>Raccourci depuis Produit Achat</h2>
<p>Vous pouvez aussi créer une Liste Achat directement depuis <strong>Produit Achat</strong> : cochez les produits qui vous intéressent, puis cliquez sur <span class="ui">${ICO_PLUS} Créer Liste Achat</span> au-dessus du tableau.</p>
`,
    en:`
<p class="lead">A <strong>Purchase List</strong> is a list of products, at a price, from a supplier, valid over a period, and assigned to one or more customers. It's the core of your distribution activity.</p>

<h2>Create a Purchase List</h2>
<ol>
  <li>Open <strong>Purchase List</strong> in the sidebar.</li>
  <li>Click <span class="ui">${ICO_PLUS} Add</span>.</li>
  <li>Choose the <strong>Supplier</strong>.</li>
  <li>Set the <strong>validity period</strong> (start date — end date).</li>
  <li>Choose the <strong>customer group</strong>.</li>
  <li>Add products one by one, with their price.</li>
  <li>Save.</li>
</ol>

<h2>Purchase List table columns</h2>
<table class="tbl">
<thead><tr><th>Column</th><th>Content</th></tr></thead>
<tbody>
<tr><td><strong>Code</strong></td><td>Unique list identifier.</td></tr>
<tr><td><strong>Supplier</strong></td><td>Supplier concerned.</td></tr>
<tr><td><strong>Group</strong></td><td>Customer group targeted by the list.</td></tr>
<tr><td><strong>Date</strong></td><td>Validity period.</td></tr>
<tr><td><strong>Lines</strong></td><td>Number of products in the list.</td></tr>

    en:`
<p class="lead">Your <strong>Mercuriale</strong> is your catalogue: the list of products referenced for your company by your distributor / purchasing hub, with their prices and packaging. It's the customer-side equivalent of the gestionnaire's <em>Purchase Product</em> page.</p>

    en:`
<p class="lead">If you don't have the <strong>Stock Management</strong> module, you can't place orders online. But you can generate a <strong>blank purchase sheet</strong> to print, fill in by hand, and send to your supplier.</p>

<ol>
  <li>Open <strong>Mercuriale</strong> in the sidebar.</li>
  <li>In the <span class="ui">Fournisseur</span> dropdown at the top right, select the supplier to order from (e.g. AVIGROS, JOCEANE).</li>
  <li>The <span class="ui">🖨️ Impression</span> button above the table becomes active. Click it.</li>
  <li>A new tab opens with the pre-filled purchase sheet. Use the <strong>Print</strong> button 🖨️ at the top right, or <code>Cmd+P</code> / <code>Ctrl+P</code>.</li>
</ol>

  <li><strong>Delivery Address</strong> — your company.</li>
  <li><strong>Supplier</strong> — the one you selected.</li>
  <li><strong>Comment</strong> — free zone to fill by hand if needed.</li>
  <li><strong>Dates</strong> — Order (auto-filled) / Delivery (empty, to fill).</li>
  <li><strong>Product table</strong> with columns: Nr, Product Name, Unit, <em>Unit Qty</em> (empty), Pack, <em>Pack Qty</em> (empty), Comm. Price.</li>
</ul>

<h2>Typical flow</h2>
<ol>
  <li>You print the sheet (paper) or save as PDF.</li>
  <li>You fill in the desired <strong>quantities</strong> in the empty boxes (by hand or via a PDF editor).</li>
  <li>You send the sheet to your supplier (fax, scan, email, WhatsApp…).</li>
  <li>The supplier processes the order outside CHR Solution.</li>
</ol>

<div class="callout tip">

</div>

<div class="callout info">
  <div><strong>Button greyed out?</strong> The <em>Print</em> button stays greyed out until a supplier is selected in the dropdown. This is intentional: the sheet must be supplier-specific.</div>
</div>
`
  }
},

<tbody>
<tr><td>Produits / tarifs / fournisseurs envoyés par le distributeur</td><td>✅ Rafraîchis avec les derniers envois</td></tr>
<tr><td>Produits / fournisseurs / unités / familles que vous avez ajoutés vous-même</td><td>❌ Inchangés, vous gardez tout ce que vous avez saisi</td></tr>
<tr><td>Vos favoris</td><td>❌ Inchangés</td></tr>
</tbody>
</table>

<h2>À quelle fréquence ?</h2>
<p>Recommandé : au moins <strong>une fois par semaine</strong>, ou dès que votre distributeur vous signale un changement (nouvelle saison, promo ponctuelle, etc.).</p>

<div class="callout tip">
  <div><strong>Bon à savoir :</strong> la mise à jour est non destructive — elle n'écrase pas vos propres entrées et elle ne modifie pas les favoris que vous avez marqués.</div>
</div>
`,
    en:`
<p class="lead">Your distributor regularly updates the purchase lists they send you (new prices, new products, removals). To reflect these changes in your mercuriale, a single click is enough.</p>

<h2>Running the update</h2>
<ol>
  <li>Open <strong>Mercuriale</strong>.</li>
  <li>Click <span class="ui">📅 Mise à jour</span> at the top of the page.</li>
  <li>Your distributor's latest purchase lists are applied: prices refreshed, new items added.</li>
</ol>

<h2>What changes, what doesn't</h2>
<table class="tbl">
<thead><tr><th>Data type</th><th>Updated?</th></tr></thead>
<tbody>
<tr><td>Distributor-pushed products / prices / suppliers</td><td>✅ Refreshed with the latest push</td></tr>
<tr><td>Products / suppliers / units / families you added yourself</td><td>❌ Untouched, you keep everything you entered</td></tr>
<tr><td>Your favourites</td><td>❌ Untouched</td></tr>
</tbody>
</table>

<h2>How often?</h2>
<p>Recommended: at least <strong>once a week</strong>, or whenever your distributor signals a change (new season, promotion, etc.).</p>

<div class="callout tip">
  <div><strong>Good to know:</strong> the update is non-destructive — it doesn't overwrite your own entries and doesn't affect the favourites you've marked.</div>
</div>
`
  }
},

/* ========== STOCK MANAGEMENT ========== */

<p>Chaque section a sa propre logique, détaillée dans les articles qui suivent.</p>
`,

<p class="lead">Stock Management is designed for <strong>restaurateurs</strong>, <strong>chefs</strong> and <strong>kitchen purchasing managers</strong>. It handles the life of your products — from supplier order to recipe, through inventory.</p>

<h2>The 8 main sections</h2>

{
  id:"sk-orders", cat:"stock-mgmt", readTime:5,
  titles:{
    fr:"Passer et suivre une Commande",
    en:"Place and track an Order"
  },
  summaries:{
    fr:"Bons de commande, factures, statut de chaque ligne.",
    en:"Purchase orders, invoices, status of each line."
  },
  bodies:{
    fr:`
<p class="lead">La section <strong>Commande</strong> liste tous vos bons de commande et les factures associées. C'est aussi d'ici que vous en créez de nouveaux.</p>

<h2>Les 3 actions principales</h2>
<ul>
  <li><span class="ui">${ICO_PLUS} Ajouter Commande</span> — créer un nouveau bon de commande.</li>
  <li><span class="ui">$ Facture</span> — ajouter / consulter les factures liées aux commandes.</li>
  <li><span class="ui">🗑 Supprimer tout</span> — action d'administration, à utiliser avec prudence.</li>
</ul>

<h2>Filtrer et chercher</h2>
<p>Trois filtres au-dessus du tableau :</p>
<ul>
  <li><strong>Recherche</strong> — par numéro, fournisseur, ou contenu.</li>
  <li><span class="ui">Choisir Fournisseur</span> — limite à un fournisseur.</li>
  <li><span class="ui">Toutes les lignes</span> — filtre par statut de ligne.</li>
</ul>

<h2>Les colonnes du tableau Commande</h2>
<table class="tbl">
<thead><tr><th>Colonne</th><th>Description</th></tr></thead>
<tbody>
<tr><td><strong>Nr</strong></td><td>Numéro unique de la commande.</td></tr>
<tr><td><strong>Statut</strong></td><td>Où en est la commande (à envoyer, envoyée, reçue…).</td></tr>
<tr><td><strong>Date</strong></td><td>Date d'émission.</td></tr>
<tr><td><strong>Par</strong></td><td>Utilisateur qui a créé la commande.</td></tr>
<tr><td><strong>Fichier</strong></td><td>Document scanné / importé.</td></tr>
<tr><td><strong>Lignes</strong></td><td>Nombre d'articles commandés.</td></tr>
<tr><td><strong>Total HT</strong></td><td>Montant hors taxes.</td></tr>
<tr><td><strong>Png</strong></td><td>Vignette image jointe.</td></tr>
<tr><td><strong>Fournisseur</strong></td><td>Destinataire de la commande.</td></tr>
</tbody>
</table>
<p>...ou toute autre colonne utile présente sur la page.</p>

<div class="callout info">
  <div><strong>Pas de données ?</strong> Le tableau affiche "Pas de données à afficher pour le moment" tant qu'aucune commande n'existe. Créez-en une avec <em>${ICO_PLUS} Ajouter Commande</em>.</div>
</div>

<h2>L'icône cloche ${ICO_BELL_PLUS}</h2>
<p>À droite du filtre de lignes, une icône cloche avec un + active les notifications d'une commande (suivi de livraison, alertes de retard).</p>
`,
    en:`
<p class="lead">The <strong>Order</strong> section lists all your purchase orders and related invoices. This is also where you create new ones.</p>

<h2>The 3 main actions</h2>
<ul>
  <li><span class="ui">${ICO_PLUS} Add Order</span> — create a new purchase order.</li>
  <li><span class="ui">$ Invoice</span> — add / view invoices linked to orders.</li>
  <li><span class="ui">🗑 Delete all</span> — admin action, use with caution.</li>
</ul>

<h2>Filter and search</h2>
<p>Three filters above the table:</p>
<ul>
  <li><strong>Search</strong> — by number, supplier, or content.</li>
  <li><span class="ui">Choose Supplier</span> — restrict to one supplier.</li>
  <li><span class="ui">All lines</span> — filter by line status.</li>
</ul>

<h2>Order table columns</h2>
<table class="tbl">
<thead><tr><th>Column</th><th>Description</th></tr></thead>
<tbody>
<tr><td><strong>Nr</strong></td><td>Unique order number.</td></tr>
<tr><td><strong>Status</strong></td><td>Where the order stands (to send, sent, received…).</td></tr>
<tr><td><strong>Date</strong></td><td>Issue date.</td></tr>
<tr><td><strong>By</strong></td><td>User who created the order.</td></tr>
<tr><td><strong>File</strong></td><td>Scanned / imported document.</td></tr>
<tr><td><strong>Lines</strong></td><td>Number of items ordered.</td></tr>
<tr><td><strong>Total ex. VAT</strong></td><td>Amount excluding taxes.</td></tr>
<tr><td><strong>Png</strong></td><td>Attached image thumbnail.</td></tr>
<tr><td><strong>Supplier</strong></td><td>Order recipient.</td></tr>
</tbody>
</table>
<p>...or any other useful column present on the page.</p>

<div class="callout info">
  <div><strong>No data?</strong> The table shows "No data to display" until an order exists. Create one with <em>${ICO_PLUS} Add Order</em>.</div>
</div>

<h2>The ${ICO_BELL_PLUS} bell icon</h2>
<p>To the right of the line filter, a bell icon with a + activates notifications for an order (delivery tracking, late alerts).</p>
`
  }
},

{
  id:"sk-suppliers", cat:"stock-mgmt", readTime:2,
  titles:{
    fr:"Fournisseurs côté Stock",
    en:"Suppliers (Stock side)"
  },
  summaries:{
    fr:"Vue orientée cuisine : contacts rapides pour passer commande.",
    en:"Kitchen-oriented view: quick contacts to place an order."
  },
  bodies:{
    fr:`
<p class="lead">La section <strong>Fournisseurs</strong> côté Stock reprend les fournisseurs de votre base, avec une présentation plus compacte pensée pour l'équipe cuisine.</p>

<p>Les champs sont les mêmes que côté Achats : nom, e-mail, téléphone, adresse, ou tout autre champ utile présent sur la page. La différence est surtout ergonomique : on passe moins de temps ici car on commande plus qu'on n'édite.</p>

`,

<p class="lead">The <strong>Suppliers</strong> section on the Stock side shows the same suppliers as your main base, but with a more compact presentation designed for the kitchen team.</p>

<p>The fields are the same as on the Purchase side: name, email, phone, address, or any other useful field on the page. The difference is mainly ergonomic — you spend less time here since you order more than you edit.</p>

<p>To create or deeply edit a supplier, go to <a href="#/a/pc-suppliers">Purchase Management → Suppliers</a>.</p>
`

},

{
  id:"sk-stock-products", cat:"stock-mgmt", readTime:3,
  titles:{
    fr:"Produits Stock",
    en:"Stock Products"
  },
  summaries:{
    fr:"Votre catalogue produits vu depuis la cuisine.",
    en:"Your product catalogue from the kitchen's perspective."
  },
  bodies:{
    fr:`
<p class="lead">Produits Stock est le catalogue des produits que vous utilisez en cuisine : ingrédients, boissons, consommables. Chaque produit a son unité, son fournisseur, son prix de référence.</p>

<h2>Les informations d'un produit</h2>
<ul>
  <li>Nom et famille.</li>
  <li>Unité d'achat (Kg, L, Pc…) et unité de consommation (g, ml, Pc).</li>
  <li>Prix HT courant.</li>
  <li>Fournisseur principal.</li>
  <li>Stock actuel (si l'inventaire est à jour).</li>
  <li>...ou tout autre champ utile présent sur la page.</li>
</ul>

<h2>Lien avec les recettes</h2>
<p>Un produit Stock est utilisable dans une <a href="#/a/sk-recipes">recette</a> : son prix unitaire est consommé au prorata de la quantité utilisée, ce qui alimente le calcul du coût matière.</p>
`,
    en:`
<p class="lead">Stock Products is the catalogue of products you use in the kitchen: ingredients, drinks, consumables. Each product has its unit, its supplier, its reference price.</p>

<h2>Product information</h2>
<ul>
  <li>Name and family.</li>
  <li>Purchase unit (Kg, L, Pc…) and consumption unit (g, ml, Pc).</li>
  <li>Current price ex. VAT.</li>
  <li>Main supplier.</li>
  <li>Current stock (if inventory is up to date).</li>
  <li>...or any other useful field on the page.</li>
</ul>

<h2>Link with recipes</h2>
<p>A Stock Product can be used in a <a href="#/a/sk-recipes">recipe</a>: its unit price is consumed pro rata to the quantity used, which feeds the food cost calculation.</p>
`
  }
},

{
  id:"sk-transfer", cat:"stock-mgmt", readTime:2,
  titles:{
    fr:"Transfert Stock",
    en:"Stock Transfer"
  },
  summaries:{
    fr:"Déplacer des produits d'un emplacement à un autre.",
    en:"Move products from one location to another."
  },
  bodies:{
    fr:`
<p class="lead">Le <strong>Transfert Stock</strong> enregistre le mouvement d'un produit entre deux emplacements : cave → salle, cuisine → bar, stock central → antenne.</p>

<h2>Pourquoi l'utiliser ?</h2>
<ul>
  <li>Suivre ce qui sort du stock principal.</li>
  <li>Imputer le coût au bon centre de profit.</li>
  <li>Avoir un inventaire cohérent dans chaque zone.</li>
</ul>

<p>Renseignez : produit, quantité, emplacement source, emplacement destination, date, ou tout autre champ utile présent sur la page. L'outil ajuste automatiquement les deux stocks.</p>
`,
    en:`
<p class="lead"><strong>Stock Transfer</strong> records the movement of a product between two locations: cellar → dining room, kitchen → bar, central stock → satellite.</p>

<h2>Why use it?</h2>
<ul>
  <li>Track what leaves the main stock.</li>
  <li>Allocate cost to the right profit center.</li>
  <li>Maintain consistent inventory in each area.</li>
</ul>

<p>Fill in: product, quantity, source location, destination location, date, or any other useful field on the page. The tool automatically adjusts both stocks.</p>
`
  }
},

{
  id:"sk-inventory", cat:"stock-mgmt", readTime:3,
  titles:{
    fr:"Saisir un Inventaire",
    en:"Record an Inventory"
  },
  summaries:{
    fr:"Le comptage périodique qui valorise votre stock.",
    en:"The periodic count that values your stock."
  },
  bodies:{
    fr:`
<p class="lead">L'<strong>Inventaire</strong> est la photographie du stock à un instant T. C'est l'écart entre deux inventaires (+ entrées - sorties) qui fait émerger les pertes, les erreurs de saisie ou les vols.</p>

<h2>Les étapes</h2>
<ol>
  <li>Ouvrez <strong>Inventaire</strong> dans la sidebar.</li>
  <li>Cliquez sur <span class="ui">${ICO_PLUS} Ajouter</span> pour démarrer un nouvel inventaire.</li>
  <li>Comptez et saisissez les quantités par zone (cuisine, cave, bar…).</li>
  <li>Validez — l'outil calcule la valorisation et les écarts avec le précédent inventaire.</li>
</ol>

<div class="callout tip">
  <div><strong>Bonne pratique :</strong> un inventaire hebdomadaire ou mensuel donne les meilleurs résultats. Plus c'est fréquent, plus vous détectez tôt les anomalies.</div>
</div>
`,
    en:`
<p class="lead">The <strong>Inventory</strong> is the snapshot of stock at a given moment. It's the gap between two inventories (+ inflows − outflows) that reveals losses, entry errors, or theft.</p>

<h2>Steps</h2>
<ol>
  <li>Open <strong>Inventory</strong> in the sidebar.</li>
  <li>Click <span class="ui">${ICO_PLUS} Add</span> to start a new inventory.</li>
  <li>Count and enter quantities by area (kitchen, cellar, bar…).</li>
  <li>Validate — the tool computes the valuation and the variances from the previous inventory.</li>
</ol>

<div class="callout tip">
  <div><strong>Best practice:</strong> a weekly or monthly inventory yields the best results. The more frequent, the earlier you catch anomalies.</div>
</div>
`
  }
},

{
  id:"sk-sales", cat:"stock-mgmt", readTime:2,
  titles:{
    fr:"Ventes",
    en:"Sales"
  },
  summaries:{
    fr:"Le rapprochement entre les plats servis et les produits consommés.",
    en:"The reconciliation between dishes served and products consumed."
  },
  bodies:{
    fr:`
<p class="lead">La section <strong>Ventes</strong> référence les produits vendus (plats, boissons, menus). Couplée aux recettes, elle permet de déduire automatiquement les produits consommés pour équilibrer le stock théorique et réel.</p>
<p>Si votre caisse est connectée, les ventes remontent automatiquement. Sinon, un import manuel (CSV) est possible.</p>
`,
    en:`
<p class="lead">The <strong>Sales</strong> section references sold products (dishes, drinks, menus). Paired with recipes, it lets you automatically deduct consumed products to balance theoretical and actual stock.</p>
<p>If your POS is connected, sales come in automatically. Otherwise, a manual CSV import is available.</p>
`
  }
},

{
  id:"sk-recipes", cat:"stock-mgmt", readTime:4,
  titles:{
    fr:"Recettes et coût matière",
    en:"Recipes and food cost"
  },
  summaries:{
    fr:"Construire une fiche technique, obtenir un coût matière fiable.",
    en:"Build a technical sheet, get a reliable food cost."
  },
  bodies:{
    fr:`
<p class="lead">Les <strong>Recettes</strong> lient vos produits vendus à vos produits stock, avec des quantités précises. À partir de là, l'outil calcule automatiquement votre <strong>coût matière</strong>.</p>

<h2>Créer une recette</h2>
<ol>
  <li>Ouvrez <strong>Recettes</strong> dans la sidebar.</li>
  <li>Cliquez sur <span class="ui">${ICO_PLUS} Ajouter</span>.</li>
  <li>Saisissez : nom de la recette, nombre de couverts, allergènes, ou tout autre champ utile présent sur la page.</li>
  <li>Ajoutez les <strong>ingrédients</strong> en recherchant dans Produits Stock.</li>
  <li>Pour chaque ingrédient, indiquez la quantité dans l'unité de consommation.</li>
  <li>Facultatif : étapes de préparation (texte libre).</li>
</ol>

<h2>Le calcul du coût matière</h2>
<p>Pour chaque ingrédient, l'outil multiplie la quantité par le prix unitaire de consommation (prix du produit ÷ quantité dans son conditionnement). Le total donne votre coût matière par portion.</p>

<div class="callout tip">
  <div><strong>Quand un tarif fournisseur change</strong>, le coût matière de toutes les recettes utilisant ce produit est recalculé automatiquement. Gardez un œil sur vos plats signatures pour ajuster vos prix de vente si besoin.</div>
</div>
`,
    en:`
<p class="lead"><strong>Recipes</strong> link your sold products to your stock products with precise quantities. From there, the tool automatically computes your <strong>food cost</strong>.</p>

<h2>Create a recipe</h2>
<ol>
  <li>Open <strong>Recipes</strong> in the sidebar.</li>
  <li>Click <span class="ui">${ICO_PLUS} Add</span>.</li>
  <li>Fill in: recipe name, number of servings, allergens, or any other useful field on the page.</li>
  <li>Add <strong>ingredients</strong> by searching in Stock Products.</li>
  <li>For each ingredient, enter the quantity in the consumption unit.</li>
  <li>Optional: preparation steps (free text).</li>
</ol>

<h2>Food cost calculation</h2>
<p>For each ingredient, the tool multiplies the quantity by the consumption unit price (product price ÷ quantity in its packaging). The total gives your food cost per portion.</p>

<div class="callout tip">
  <div><strong>When a supplier price changes</strong>, the food cost of all recipes using that product is recalculated automatically. Keep an eye on your signature dishes to adjust selling prices if needed.</div>
</div>
`
  }
},

{
  id:"sk-production", cat:"stock-mgmt", readTime:2,
  titles:{
    fr:"Production",
    en:"Production"
  },
  summaries:{
    fr:"Lots produits en interne (sauces mères, bases, desserts…).",
    en:"In-house produced batches (mother sauces, bases, desserts…)."
  },
  bodies:{
    fr:`
<p class="lead">La <strong>Production</strong> trace les lots que vous fabriquez vous-même : sauces mères, bases de cuisine, pâtisserie maison, fonds et fumets.</p>

<h2>Pourquoi c'est utile</h2>
<ul>
  <li>Connaître précisément le coût d'un produit qui n'a pas de fournisseur externe.</li>
  <li>Suivre les DLC internes et la fraîcheur des bases.</li>
  <li>Comparer le volume produit vs volume consommé.</li>
</ul>

<p>Une Production est essentiellement une <em>recette</em> à rendement. Les ingrédients consommés sont décrémentés du stock et le produit fini est crédité.</p>
`,
    en:`
<p class="lead"><strong>Production</strong> tracks the batches you produce in-house: mother sauces, kitchen bases, homemade pastry, stocks and fumets.</p>

<h2>Why it's useful</h2>
<ul>
  <li>Know the precise cost of a product without an external supplier.</li>
  <li>Track internal use-by dates and the freshness of bases.</li>
  <li>Compare produced vs consumed volume.</li>
</ul>

<p>A Production is essentially a <em>recipe</em> with yield. Consumed ingredients are deducted from stock, and the finished product is credited.</p>
`
  }
},

/* ========== SETTINGS & ACCOUNT ========== */

<ul>

  <li>Change your password.</li>
  <li>Manage preferences (language, timezone, notifications).</li>
  <li>View your subscription info (plan, renewal date).</li>
  <li>...or any other useful field on the page.</li>

{
  id:"company", cat:"settings", readTime:2,
  titles:{
    fr:"Ma Companie (paramètres entreprise)",
    en:"My Company (company settings)"
  },
  summaries:{
    fr:"Nom, adresse, SIRET, logo — les infos de votre structure.",
    en:"Name, address, company ID, logo — your company info."
  },
  bodies:{
    fr:`
<p class="lead"><strong>Paramètres → Ma Companie</strong> regroupe les informations de votre entreprise. Ces données sont utilisées sur vos bons de commande, factures et documents exportés.</p>

<h2>Les champs</h2>

{
  id:"setup", cat:"settings", readTime:3, badge:"admin",
  titles:{
    fr:"Setup (paramètres avancés)",
    en:"Setup (advanced settings)"
  },
  summaries:{
    fr:"Profils et droits, catégories, unités, intégrations.",
    en:"Profiles and permissions, categories, units, integrations."
  },
  bodies:{
    fr:`
<p class="lead"><span class="badge admin">Réservé aux admins</span> La section <strong>Paramètres → Setup</strong> regroupe la configuration fine du système. La plupart des utilisateurs n'y touchent jamais.</p>

<h2>Les droits d'accès</h2>
<p>Dans CHR Solution, les droits se paramètrent <strong>par profil</strong>. Un profil est ensuite <strong>affecté à un ou plusieurs utilisateurs</strong>. Vous ne gérez donc pas les droits utilisateur par utilisateur, mais au niveau du profil — ce qui permet de créer des rôles types (ex. "Chef", "Responsable achat", "Admin") et d'y rattacher vos collaborateurs.</p>

<h2>Les options actuelles du Setup</h2>
<ul>
  <li><strong>Profils &amp; droits</strong> — créer/éditer les profils, définir finement ce qu'un profil peut voir et faire.</li>
  <li><strong>Utilisateurs</strong> — inviter des utilisateurs et leur affecter un profil.</li>
  <li><strong>Familles &amp; sous-familles</strong> — structure du catalogue produit (liée à <em>Gérer Groupes</em>).</li>
  <li><strong>Unités de mesure</strong> — Kg, L, Pc, et personnalisations (liée à <em>Gérer Unités</em>).</li>
  <li><strong>Groupes de clients</strong> — création et édition des groupes (Commun, etc.).</li>
  <li>...ou toute autre option présente sur la page.</li>
</ul>

<div class="callout warn">
  <div><strong>Attention :</strong> les modifications dans Setup peuvent avoir un impact sur toute l'entreprise. Notez vos changements pour pouvoir revenir en arrière.</div>
</div>
`,
    en:`
<p class="lead"><span class="badge admin">Admin only</span> The <strong>Settings → Setup</strong> section groups fine-grained system configuration. Most users never open it.</p>

<h2>Permissions</h2>
<p>In CHR Solution, permissions are configured <strong>by profile</strong>. A profile is then <strong>assigned to one or more users</strong>. You don't manage permissions user by user, but at the profile level — which lets you create standard roles (e.g., "Chef", "Purchasing Manager", "Admin") and attach your team members to them.</p>

<h2>Current Setup options</h2>
<ul>
  <li><strong>Profiles &amp; permissions</strong> — create/edit profiles, precisely define what each profile can see and do.</li>
  <li><strong>Users</strong> — invite users and assign them a profile.</li>
  <li><strong>Families &amp; sub-families</strong> — product catalogue structure (linked to <em>Manage Groups</em>).</li>
  <li><strong>Units of measure</strong> — Kg, L, Pc, and customizations (linked to <em>Manage Units</em>).</li>
  <li><strong>Customer groups</strong> — create and edit groups (Common, etc.).</li>
  <li>...or any other option present on the page.</li>
</ul>

<div class="callout warn">
  <div><strong>Caution:</strong> changes in Setup can impact the entire company. Keep notes of your changes so you can revert if needed.</div>
</div>
`
  }
},

/* ============================================================
   LANGUE — détection + sélecteur + persistance
   ============================================================ */
const LANG_KEY = 'chr-help-lang';
function detectLang(){
  try {
    const saved = localStorage.getItem(LANG_KEY);
    if (saved === 'fr' || saved === 'en') return saved;
  } catch(e){}
  const nav = (navigator.language || 'fr').toLowerCase();
  return nav.startsWith('en') ? 'en' : 'fr';
}
let currentLang = detectLang();

function t(key, ...args){
  const v = I18N[currentLang][key];
  return typeof v === 'function' ? v(...args) : v;
}

function setLang(lang){
  if (lang !== 'fr' && lang !== 'en') return;
  currentLang = lang;
  try { localStorage.setItem(LANG_KEY, lang); } catch(e){}
  document.documentElement.setAttribute('lang', lang);
  renderLangSwitcher();
  renderHeroStatic();
  route();
}

function renderLangSwitcher(){
  const $ls = document.getElementById('langSwitcher');
  $ls.innerHTML = `
    <button data-lang="fr" class="${currentLang==='fr'?'active':''}" aria-label="Français"><span class="flag">🇫🇷</span> FR</button>
    <button data-lang="en" class="${currentLang==='en'?'active':''}" aria-label="English"><span class="flag">🇬🇧</span> EN</button>
  `;
  $ls.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', e => setLang(btn.dataset.lang));
  });
}

function renderHeroStatic(){
  document.getElementById('heroEyebrow').textContent = t('eyebrow');
  document.getElementById('heroTitle').textContent = t('heroTitle');
  document.getElementById('heroSubtitle').textContent = t('heroSubtitle');
  document.getElementById('search').placeholder = t('searchPlaceholder');
  const backEl = document.querySelector('#backHome span');
  if (backEl) backEl.textContent = t('backHome');
}

/* ============================================================
   ROUTEUR + RENDU
   ============================================================ */
const $app = document.getElementById('app');
const $hero = document.getElementById('hero');

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}

function articlesByCat(catId){return ARTICLES.filter(a=>a.cat===catId)}
function catById(id){return CATEGORIES.find(c=>c.id===id)}
function articleById(id){return ARTICLES.find(a=>a.id===id)}

function renderHome(){
  $hero.classList.remove('compact');
  const cats = CATEGORIES.map(c=>{
    const n = articlesByCat(c.id).length;
    return `
      <a class="cat-card" href="#/c/${c.id}">
        <div class="cat-icon ${c.iconCls}">${c.icon}</div>
        <h3>${escapeHtml(c.titles[currentLang])}</h3>
        <p>${escapeHtml(c.descs[currentLang])}</p>
        <div class="count">${t('articlesCount', n)}</div>
      </a>`;
  }).join('');

  $app.className = 'container overlap';
  $app.innerHTML = `
    <div class="cat-grid">${cats}</div>
    <div class="contact-cta">
      <div>
        <h3>${t('ctaHomeTitle')}</h3>
        <p>${t('ctaHomeText')}</p>
      </div>
      <a class="btn" href="#" onclick="chrOpenSupport(event)">${t('ctaBtn')}</a>
    </div>`;
  window.scrollTo({top:0,behavior:'instant'});
}

function renderCategory(catId){
  const cat = catById(catId);
  if(!cat){ location.hash='#/'; return; }
  $hero.classList.add('compact');
  const arts = articlesByCat(catId);

  const list = arts.length ? arts.map((a,i)=>`
    <a href="#/a/${a.id}">
      <div class="art-num">${i+1}</div>
      <div class="art-body">
        <strong>${escapeHtml(a.titles[currentLang])} ${a.badge?`<span class="badge ${a.badge}">${a.badge==='admin'?t('adminBadge'):t('soonBadge')}</span>`:''}</strong>
        <p>${escapeHtml(a.summaries[currentLang])} · ${t('readTime', a.readTime)}</p>
      </div>
      <span class="art-arrow">›</span>
    </a>`).join('') : `<div style="padding:28px;text-align:center;color:var(--muted)">${t('noArticles')}</div>`;

  $app.className = 'container';
  $app.innerHTML = `
    <div class="cat-header">
      <div class="breadcrumb"><a href="#/">${t('home')}</a><span class="sep">›</span> ${escapeHtml(cat.titles[currentLang])}</div>
      <h1>${escapeHtml(cat.titles[currentLang])}</h1>
      <p>${escapeHtml(cat.descs[currentLang])}</p>
    </div>
    <div class="article-list">${list}</div>
    <div class="contact-cta">
      <div>
        <h3>${t('ctaCatTitle')}</h3>
        <p>${t('ctaCatText')}</p>
      </div>
      <a class="btn outline" href="#" onclick="chrOpenSupport(event)">${t('ctaBtn')}</a>
    </div>`;
  window.scrollTo({top:0,behavior:'instant'});
}

function renderArticle(artId){
  const art = articleById(artId);
  if(!art){ location.hash='#/'; return; }
  $hero.classList.add('compact');
  const cat = catById(art.cat);
  const siblings = articlesByCat(art.cat);
  const idx = siblings.findIndex(a=>a.id===art.id);
  const prev = siblings[idx-1]; const next = siblings[idx+1];

  const related = siblings.filter(a=>a.id!==art.id).slice(0,4);

  const sideNav = `
    <div class="side-nav">
      <h4>${escapeHtml(cat.titles[currentLang])}</h4>
      <ul>
        ${siblings.map(a=>`
          <li><a class="${a.id===art.id?'active':''}" href="#/a/${a.id}">${escapeHtml(a.titles[currentLang])}</a></li>
        `).join('')}
      </ul>
    </div>`;

  const nav = (prev||next) ? `
    <div style="display:flex;justify-content:space-between;gap:12px;margin-top:28px">
      ${prev?`<a class="btn outline" href="#/a/${prev.id}">← ${escapeHtml(prev.titles[currentLang])}</a>`:'<span></span>'}
      ${next?`<a class="btn outline" href="#/a/${next.id}">${escapeHtml(next.titles[currentLang])} →</a>`:'<span></span>'}
    </div>` : '';

  const relatedHtml = related.length ? `
    <div class="related">
      <h4>${t('relatedTitle')}</h4>
      <div class="related-grid">
        ${related.map(a=>`
          <a href="#/a/${a.id}">
            <strong>${escapeHtml(a.titles[currentLang])}</strong><br>
            <small style="color:var(--muted)">${escapeHtml(a.summaries[currentLang])}</small>
          </a>`).join('')}
      </div>
    </div>` : '';

  $app.className = 'container';
  $app.innerHTML = `
    <div class="article-layout">
      ${sideNav}
      <article class="article">
        <div class="breadcrumb">
          <a href="#/">${t('home')}</a><span class="sep">›</span>
          <a href="#/c/${cat.id}">${escapeHtml(cat.titles[currentLang])}</a><span class="sep">›</span>
          ${escapeHtml(art.titles[currentLang])}
        </div>
        <h1>${escapeHtml(art.titles[currentLang])}</h1>
        <div class="meta">
          <span><svg width="14" height="14"><use href="#i-clock"/></svg> ${t('readTime', art.readTime)}</span>
          <span><svg width="14" height="14"><use href="#i-folder"/></svg> ${escapeHtml(cat.titles[currentLang])}</span>
          ${art.badge?`<span class="badge ${art.badge}">${art.badge==='admin'?t('adminBadge'):t('soonBadge')}</span>`:''}
        </div>
        ${art.bodies[currentLang]}
        ${nav}
        ${relatedHtml}
      </article>
    </div>`;
  window.scrollTo({top:0,behavior:'instant'});
}

function route(){
  const h = location.hash || '#/';
  const parts = h.replace(/^#\//,'').split('/').filter(Boolean);
  if(parts.length===0) return renderHome();
  if(parts[0]==='c' && parts[1]) return renderCategory(parts[1]);
  if(parts[0]==='a' && parts[1]) return renderArticle(parts[1]);
  return renderHome();
}

window.addEventListener('hashchange', route);

/* Deep-link depuis Bubble */
window.addEventListener('message', e=>{
  if(!e.data || typeof e.data !== 'object') return;
  if(e.data.chrHelp === 'goto'){
    if(e.data.lang && (e.data.lang==='fr' || e.data.lang==='en')){
      setLang(e.data.lang);
    }
    if(e.data.article) location.hash = '#/a/' + e.data.article;
    else if(e.data.category) location.hash = '#/c/' + e.data.category;
    else location.hash = '#/';
  }
});

/* Search */
const $search = document.getElementById('search');
const $results = document.getElementById('searchResults');

function runSearch(q){
  const query = q.trim().toLowerCase();
  if(query.length<2){ $results.classList.remove('open'); $results.innerHTML=''; return; }
  const matches = ARTICLES.filter(a => {
    const txt = (a.titles[currentLang] + ' ' + a.summaries[currentLang] + ' ' + a.bodies[currentLang]).toLowerCase();
    return txt.includes(query);
  }).slice(0,10);
  if(matches.length===0){
    $results.innerHTML = `<div class="empty">${t('searchEmpty')}</div>`;
  } else {
    $results.innerHTML = matches.map(a=>`
      <a class="item" href="#/a/${a.id}">
        <strong>${escapeHtml(a.titles[currentLang])}</strong>
        <span>${escapeHtml(catById(a.cat).titles[currentLang])} · ${escapeHtml(a.summaries[currentLang])}</span>
      </a>`).join('');
  }
  $results.classList.add('open');
}

$search.addEventListener('input', e=>runSearch(e.target.value));
$search.addEventListener('focus', e=>{ if(e.target.value.trim().length>=2) $results.classList.add('open'); });
document.addEventListener('click', e=>{
  if(!e.target.closest('.search-wrap')) $results.classList.remove('open');
});
$results.addEventListener('click', ()=>{
  $results.classList.remove('open');
  setTimeout(()=>{ $search.value=''; }, 150);
});

/* Init */

// Détecter le mode embedded : si on est dans une iframe (popup Bubble ou
// n'importe quel embed), on masque le hero et on garde juste la barre de recherche.
try {
  if (window.self !== window.top) {
    document.body.classList.add('embedded');
  }
} catch (e) {
  // Cross-origin access exception = on est dans une iframe
  document.body.classList.add('embedded');
}

renderLangSwitcher();
renderHeroStatic();
route();

/* ============================================================
   Captcha anti-spam pour le bouton "Contacter le support"
   L'email n'est jamais dans le HTML statique (obfuscation scrapers)
   + petit calcul à résoudre avant d'ouvrir mailto:.
   ============================================================ */
(function(){
  let a=0, b=0;
  function mount(){
    if(document.getElementById('chrCaptchaBackdrop')) return;
    const html = '<div class="captcha-backdrop hidden" id="chrCaptchaBackdrop" role="dialog" aria-modal="true" aria-labelledby="chrCaptchaTitle">' +
      '<div class="captcha-modal">' +
        '<h3 id="chrCaptchaTitle"></h3>' +
        '<p class="hint" id="chrCaptchaHint"></p>' +
        '<div class="captcha-question" id="chrCaptchaQuestion"></div>' +
        '<input type="number" inputmode="numeric" class="captcha-input" id="chrCaptchaInput" aria-label="Answer" autocomplete="off">' +
        '<p class="captcha-error" id="chrCaptchaError"></p>' +
        '<div class="captcha-actions">' +
          '<button class="btn outline" type="button" id="chrCaptchaCancel"></button>' +
          '<button class="btn" type="button" id="chrCaptchaSubmit"></button>' +
        '</div>' +
      '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
    document.getElementById('chrCaptchaCancel').addEventListener('click', close);
    document.getElementById('chrCaptchaSubmit').addEventListener('click', verify);
    document.getElementById('chrCaptchaInput').addEventListener('keydown', e => {
      if(e.key === 'Enter'){ e.preventDefault(); verify(); }
      if(e.key === 'Escape'){ close(); }
    });
    document.getElementById('chrCaptchaBackdrop').addEventListener('click', e => {
      if(e.target.id === 'chrCaptchaBackdrop') close();
    });
  }
  function open(){
    mount();
    a = Math.floor(Math.random()*8)+2;
    b = Math.floor(Math.random()*8)+2;
    document.getElementById('chrCaptchaTitle').textContent = t('captchaTitle');
    document.getElementById('chrCaptchaHint').textContent = t('captchaHint');
    document.getElementById('chrCaptchaQuestion').textContent = a + ' + ' + b + ' = ?';
    document.getElementById('chrCaptchaSubmit').textContent = t('captchaSubmit');
    document.getElementById('chrCaptchaCancel').textContent = t('captchaCancel');
    document.getElementById('chrCaptchaError').textContent = '';
    const input = document.getElementById('chrCaptchaInput');
    input.value = '';
    document.getElementById('chrCaptchaBackdrop').classList.remove('hidden');
    setTimeout(function(){ input.focus(); }, 50);
  }
  function close(){
    const bd = document.getElementById('chrCaptchaBackdrop');
    if(bd) bd.classList.add('hidden');
  }
  function openMailto(){
    const u = String.fromCharCode(115,117,112,112,111,114,116);
    const d = ['chrsolution','app'].join('.');
    window.open('mailto:' + u + '@' + d + '?subject=' + encodeURIComponent('[CHR Solution] Demande de support'), '_self');
  }
  function verify(){
    const val = parseInt(document.getElementById('chrCaptchaInput').value, 10);
    if(val === a + b){
      close();
      openMailto();
    } else {
      document.getElementById('chrCaptchaError').textContent = t('captchaError');
      const input = document.getElementById('chrCaptchaInput');
      input.value = '';
      input.focus();
    }
  }
  window.chrOpenSupport = function(e){
    if(e && e.preventDefault) e.preventDefault();
    // En iframe Bubble : user déjà authentifié, on skip le captcha
    if(document.body.classList.contains('embedded')){
      openMailto();
      return;
    }
    open();
  };
})();
</script>
</body>
</html>
