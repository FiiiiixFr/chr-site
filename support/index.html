<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Centre d'aide CHR Solution â guides, FAQ et support.">
<title>CHR Solution â Help Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Palette bleu nuit (aligne sur main.css) */
    --color-bg:           #0A1028;
    --color-bg-soft:      #121A36;
    --color-bg-elevated:  #1B2446;
    --color-bg-deep:      #050920;

    /* Accents creme chaud (conservent variables --color-gold*) */
    --color-gold:         #F2E8D5;
    --color-gold-soft:    #FAF2DE;
    --color-gold-deep:    #D9C99E;
    --color-copper:       #C9B68A;

    /* Texte */
    --color-text:         #F0EADA;
    --color-text-soft:    #B8B4A8;
    --color-text-dim:     #7A7668;
    --color-white:        #FFFFFF;

    /* Bords */
    --color-border:       rgba(242, 232, 213, 0.16);
    --color-border-soft:  rgba(242, 232, 213, 0.08);

    /* Semantique */
    --color-success:      #7BC28A;
    --color-danger:       #E07A6B;
    --color-info:         #8FB4D9;

    /* Typo */
    --font-body:    'Barlow', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    --font-display: 'Playfair Display', Georgia, serif;

    /* Espacements */
    --space-xs: 0.5rem;
    --space-sm: 1rem;
    --space-md: 2rem;
    --space-lg: 4rem;
    --space-xl: 6rem;

    --container-max: 1200px;
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 20px;

    --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.5);
    --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.55);
    --shadow-lg: 0 22px 60px rgba(0, 0, 0, 0.65);
    --shadow-gold: 0 0 24px rgba(242, 232, 213, 0.15);
  }

  * { box-sizing: border-box; margin:0; padding:0 }
  html, body { height: 100%; }
  body {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 17px;
    line-height: 1.6;
    color: var(--color-text);
    background: var(--color-bg);
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--color-gold); text-decoration: none; transition: color .2s; }
  a:hover { color: var(--color-gold-soft); }
  p { margin: 0 0 1rem; color: var(--color-text); }
  code { background: var(--color-bg-elevated); padding: .15rem .4rem; border-radius: 4px; font-size: .88em; color: var(--color-gold-soft); border: 1px solid var(--color-border-soft); }
  hr { border: none; border-top: 1px solid var(--color-border); margin: 2rem 0; }

  .ico { width: 1em; height: 1em; display: inline-block; vertical-align: -0.125em; }
  svg circle { stroke: currentColor; }

  /* HERO */
  .hero {
    position: relative;
    padding: 5rem 1.5rem 5.5rem;
    text-align: center;
    color: var(--color-text);
    background: radial-gradient(ellipse at top, var(--color-bg-elevated) 0%, var(--color-bg) 55%, var(--color-bg-deep) 100%);
    overflow: hidden;
    border-bottom: 1px solid var(--color-border-soft);
  }
  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(242, 232, 213, 0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-inner { position: relative; max-width: 780px; margin: 0 auto; z-index: 1; }
  .eyebrow {
    display: inline-block;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: .78rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--color-gold);
    margin-bottom: 1.1rem;
    padding: .35rem .8rem;
    border: 1px solid var(--color-border);
    border-radius: 999px;
    background: rgba(242, 232, 213, 0.04);
  }
  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    font-weight: 700;
    line-height: 1.1;
    color: var(--color-text);
    margin-bottom: 1rem;
    letter-spacing: -0.01em;
  }
  .hero p { color: var(--color-text-soft); font-size: 1.08rem; max-width: 620px; margin: 0 auto 2rem; }
  .hero.compact { padding: 3rem 1.5rem 3.5rem; }
  .back-home {
    display: inline-flex; align-items: center; gap: .4rem;
    color: var(--color-text-soft);
    font-size: .9rem; font-weight: 500;
    margin-bottom: 1.2rem;
    transition: color .2s;
  }
  .back-home:hover { color: var(--color-gold); }

  /* SEARCH */
  .search-wrap {
    position: relative;
    max-width: 560px;
    margin: 0 auto;
  }
  .search-wrap input {
    width: 100%;
    padding: 1rem 1.2rem 1rem 3rem;
    background: var(--color-bg-soft);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text);
    font-family: var(--font-body);
    font-size: 1rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }
  .search-wrap input::placeholder { color: var(--color-text-dim); }
  .search-wrap input:focus { border-color: var(--color-gold); box-shadow: var(--shadow-gold); background: var(--color-bg-elevated); }
  .search-icon {
    position: absolute;
    left: 1rem; top: 50%;
    transform: translateY(-50%);
    color: var(--color-text-soft);
    pointer-events: none;
  }

  /* LANG SWITCHER */
  .lang-switcher {
    position: absolute;
    top: 1.3rem; right: 1.3rem;
    display: flex; gap: .4rem;
    z-index: 5;
  }
  .lang-switcher button {
    background: var(--color-bg-soft);
    border: 1px solid var(--color-border);
    color: var(--color-text-soft);
    font-family: var(--font-body);
    font-size: .82rem; font-weight: 600;
    padding: .35rem .7rem;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: .35rem;
    transition: background .2s, color .2s, border-color .2s;
  }
  .lang-switcher button:hover { color: var(--color-gold); border-color: var(--color-gold); }
  .lang-switcher button.active { background: var(--color-gold); color: var(--color-bg); border-color: var(--color-gold); }
  .flag { font-size: .95rem; line-height: 1; }

  /* SEARCH RESULTS DROPDOWN */
  .search-results {
    position: absolute;
    top: calc(100% + .6rem);
    left: 0; right: 0;
    background: var(--color-bg-soft);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-lg);
    max-height: 360px;
    overflow-y: auto;
    z-index: 10;
    display: none;
    text-align: left;
  }
  .search-results.open { display: block; }
  .search-results .item {
    display: block;
    padding: .8rem 1rem;
    border-bottom: 1px solid var(--color-border-soft);
    color: var(--color-text);
    transition: background .15s;
  }
  .search-results .item:last-child { border-bottom: none; }
  .search-results .item:hover { background: var(--color-bg-elevated); color: var(--color-gold); }
  .search-results .item strong { color: var(--color-gold); font-weight: 700; }
  .search-results .item span { display: block; font-size: .82rem; color: var(--color-text-soft); margin-top: .2rem; }
  .search-results .empty { padding: 1rem; color: var(--color-text-soft); font-style: italic; text-align: center; }

  /* CONTAINER */
  .container { max-width: var(--container-max); margin: 0 auto; padding: 3rem 1.5rem; }
  .container.overlap { margin-top: -2.5rem; position: relative; z-index: 2; }

  /* CATEGORIES GRID */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.2rem;
  }
  .cat-card {
    display: flex; flex-direction: column;
    padding: 1.6rem 1.4rem;
    background: var(--color-bg-soft);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    transition: transform .2s, border-color .2s, box-shadow .2s, background .2s;
    color: var(--color-text);
  }
  .cat-card:hover {
    transform: translateY(-3px);
    border-color: var(--color-gold);
    background: var(--color-bg-elevated);
    box-shadow: var(--shadow-md), var(--shadow-gold);
  }
  .cat-icon {
    width: 44px; height: 44px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: var(--radius-sm);
    margin-bottom: 1rem;
    font-size: 1.3rem;
    color: var(--color-bg);
    background: var(--color-gold);
  }
  .cat-icon.teal   { background: #6FB8B5; }
  .cat-icon.navy   { background: #4A6FA5; }
  .cat-icon.gold   { background: var(--color-gold); }
  .cat-icon.brown  { background: #8C6E4F; color: var(--color-text); }
  .cat-icon.green  { background: var(--color-success); }
  .cat-icon.red    { background: var(--color-danger); }
  .cat-icon.purple { background: #9B7BC2; }
  .cat-card h3 { font-family: var(--font-body); font-size: 1.15rem; font-weight: 700; color: var(--color-text); margin: 0 0 .4rem; letter-spacing: -0.005em; }
  .cat-card p { color: var(--color-text-soft); font-size: .95rem; margin: 0 0 .8rem; }
  .cat-card .count { margin-top: auto; font-size: .82rem; color: var(--color-text-dim); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }

  /* CATEGORY HEADER */
  .cat-header { margin-bottom: 2rem; }
  .breadcrumb { font-size: .88rem; color: var(--color-text-soft); margin-bottom: .8rem; }
  .breadcrumb a { color: var(--color-text-soft); }
  .breadcrumb a:hover { color: var(--color-gold); }
  .breadcrumb .sep { margin: 0 .4rem; color: var(--color-text-dim); }

  /* ARTICLE LIST */
  .article-list { display: flex; flex-direction: column; gap: .7rem; }
  .article-list .item {
    display: flex; align-items: center; gap: 1rem;
    padding: 1rem 1.2rem;
    background: var(--color-bg-soft);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text);
    transition: border-color .2s, transform .18s, background .2s;
  }
  .article-list .item:hover { border-color: var(--color-gold); background: var(--color-bg-elevated); transform: translateX(4px); }
  .art-num {
    flex: 0 0 auto;
    width: 34px; height: 34px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--color-bg-elevated);
    color: var(--color-gold);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    font-weight: 700; font-size: .92rem;
  }
  .art-body { flex: 1; }
  .art-body strong { font-weight: 600; color: var(--color-text); }
  .art-body p { font-size: .86rem; color: var(--color-text-soft); margin: .15rem 0 0; }
  .art-arrow { color: var(--color-text-soft); transition: transform .2s, color .2s; }
  .article-list .item:hover .art-arrow { color: var(--color-gold); transform: translateX(3px); }

  /* ARTICLE LAYOUT */
  .article-layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 3rem;
    align-items: start;
  }
  .side-nav {
    position: sticky; top: 1rem;
    padding: 1.2rem 1rem;
    background: var(--color-bg-soft);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
  }
  .side-nav h4 {
    font-family: var(--font-body);
    font-weight: 700;
    font-size: .82rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--color-gold);
    margin: 0 0 .8rem;
  }
  .side-nav ul { list-style: none; padding: 0; margin: 0; }
  .side-nav li { margin: .35rem 0; }
  .side-nav a { display: block; padding: .35rem .4rem; font-size: .92rem; color: var(--color-text-soft); border-radius: 4px; transition: color .15s, background .15s; }
  .side-nav a:hover, .side-nav a.active { color: var(--color-gold); background: var(--color-bg-elevated); }

  .article {
    background: var(--color-bg-soft);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: 2.2rem 2rem;
  }
  .article h1 {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 3vw, 2.3rem);
    font-weight: 700;
    color: var(--color-text);
    margin-bottom: .6rem;
    line-height: 1.2;
  }
  .article .meta { color: var(--color-text-soft); font-size: .85rem; margin-bottom: 1.6rem; display: flex; gap: 1rem; flex-wrap: wrap; }
  .article h2 { font-family: var(--font-body); font-size: 1.4rem; font-weight: 700; color: var(--color-gold); margin: 1.8rem 0 .8rem; letter-spacing: -0.005em; }
  .article h3 { font-family: var(--font-body); font-size: 1.1rem; font-weight: 700; color: var(--color-text); margin: 1.4rem 0 .6rem; }
  .article ul, .article ol { margin: 0 0 1rem 1.4rem; color: var(--color-text); }
  .article li { margin-bottom: .35rem; }
  .article .lead { font-size: 1.08rem; color: var(--color-text-soft); margin-bottom: 1.4rem; }

  /* CALLOUTS */
  .callout {
    padding: 1rem 1.2rem;
    margin: 1.2rem 0;
    border-left: 3px solid var(--color-gold);
    background: var(--color-bg-elevated);
    border-radius: var(--radius-sm);
    color: var(--color-text);
  }
  .callout strong { color: var(--color-gold); }
  .callout.info    { border-left-color: var(--color-info); }
  .callout.info strong { color: var(--color-info); }
  .callout.tip     { border-left-color: var(--color-success); }
  .callout.tip strong { color: var(--color-success); }
  .callout.warn    { border-left-color: var(--color-gold-deep); background: rgba(217, 201, 158, 0.08); }
  .callout.warn strong { color: var(--color-gold-deep); }
  .callout.danger  { border-left-color: var(--color-danger); background: rgba(224, 122, 107, 0.08); }
  .callout.danger strong { color: var(--color-danger); }

  /* RELATED */
  .related { margin-top: 2.5rem; }
  .related h4 {
    font-family: var(--font-body); font-weight: 700;
    font-size: .82rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--color-gold); margin: 0 0 1rem;
  }
  .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: .8rem; }

  /* BADGES */
  .badge {
    display: inline-block;
    padding: .22rem .7rem;
    border-radius: 999px;
    font-size: .7rem;
    font-weight: 700;
    background: var(--color-gold);
    color: var(--color-bg);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-left: .5rem;
    vertical-align: middle;
  }
  .badge.soon  { background: var(--color-gold-deep); color: var(--color-bg); }
  .badge.new   { background: var(--color-success); color: var(--color-bg); }
  .badge.admin { background: var(--color-info); color: var(--color-bg); }

  /* CONTACT CTA */
  .contact-cta {
    text-align: center;
    padding: 2.4rem 1.5rem;
    background: linear-gradient(135deg, var(--color-bg-soft) 0%, var(--color-bg-elevated) 100%);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    margin-top: 3rem;
  }
  .contact-cta h3 { font-family: var(--font-display); font-size: 1.6rem; font-weight: 700; color: var(--color-text); margin-bottom: .6rem; }
  .contact-cta p { color: var(--color-text-soft); margin-bottom: 1.4rem; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: .5rem;
    padding: .85rem 1.7rem;
    border-radius: var(--radius-md);
    font-weight: 700;
    font-size: .98rem;
    font-family: var(--font-body);
    cursor: pointer;
    transition: transform .18s, box-shadow .2s, background .25s, color .2s, border-color .2s;
    white-space: nowrap;
    border: 2px solid transparent;
    background: linear-gradient(135deg, var(--color-gold-soft) 0%, var(--color-copper) 100%);
    color: var(--color-bg);
    text-decoration: none;
    box-shadow: 0 6px 20px rgba(242, 232, 213, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.35);
  }
  .btn:hover {
    background: linear-gradient(135deg, var(--color-white) 0%, var(--color-gold-soft) 100%);
    color: var(--color-bg);
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(242, 232, 213, 0.3);
  }
  .btn.outline {
    background: transparent;
    color: var(--color-text);
    border: 2px solid rgba(245, 235, 217, 0.25);
    box-shadow: none;
  }
  .btn.outline:hover {
    background: rgba(245, 235, 217, 0.06);
    color: var(--color-gold);
    border-color: var(--color-gold);
    box-shadow: none;
  }

  /* TABLE */
  table.tbl {
    width: 100%; border-collapse: collapse;
    margin: 1rem 0;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  table.tbl th {
    background: var(--color-bg-elevated);
    color: var(--color-gold);
    text-align: left; font-weight: 700;
    padding: .7rem 1rem; font-size: .86rem;
    letter-spacing: .06em; text-transform: uppercase;
    border-bottom: 1px solid var(--color-border);
  }
  table.tbl td {
    padding: .7rem 1rem;
    border-bottom: 1px solid var(--color-border-soft);
    color: var(--color-text);
    font-size: .95rem;
  }
  table.tbl tr:last-child td { border-bottom: none; }
  .ui { color: var(--color-gold); font-weight: 600; }

  /* MODE EMBEDDED (iframe Bubble) */
  body.embedded .hero { display: none; }
  body.embedded .hero::before { display: none; }
  body.embedded .hero .eyebrow,
  body.embedded .hero h1,
  body.embedded .hero p { display: none; }
  body.embedded .hero-inner { display: none; }
  body.embedded .hero .search-wrap { display: none; }
  body.embedded .hero .search-wrap input { display: none; }
  body.embedded .hero .search-wrap .search-icon { display: none; }
  body.embedded .lang-switcher { position: fixed; top: .8rem; right: .8rem; }
  body.embedded .lang-switcher button { background: var(--color-bg-soft); }
  body.embedded .lang-switcher button.active { background: var(--color-gold); color: var(--color-bg); }
  body.embedded .container.overlap { margin-top: 1.5rem; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .article-layout { grid-template-columns: 1fr; gap: 1.5rem; }
    .side-nav { position: static; }
    .hero h1 { font-size: 2rem; }
  }
  @media (max-width: 560px) {
    h1 { font-size: 1.8rem; }
    h2 { font-size: 1.3rem; }
    .hero { padding: 3rem 1rem 3.5rem; }
    .hero.compact { padding: 2rem 1rem 2.2rem; }
    .container { padding: 2rem 1rem; }
    .cat-grid { grid-template-columns: 1fr; }
    .article { padding: 1.4rem 1.2rem; }
    .contact-cta { padding: 1.8rem 1.2rem; }
    .lang-switcher { top: .8rem; right: .8rem; }
  }

  /* CAPTCHA */
  .captcha-backdrop {
    position: fixed; inset: 0;
    background: rgba(5, 9, 32, 0.85);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; padding: 1rem;
    transition: opacity .2s;
  }
  .captcha-backdrop.hidden { display: none; }
  .captcha-modal {
    background: var(--color-bg-soft);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: 2rem 1.8rem;
    max-width: 420px; width: 100%;
    box-shadow: var(--shadow-lg), var(--shadow-gold);
    text-align: center;
    color: var(--color-text);
  }
  .captcha-modal h3 {
    font-family: var(--font-display);
    font-size: 1.3rem; font-weight: 700;
    color: var(--color-text); margin: 0 0 .4rem;
  }
  .captcha-modal .hint {
    color: var(--color-text-soft);
    font-size: .92rem;
    margin-bottom: 1.2rem;
  }
  .captcha-question {
    font-family: var(--font-display);
    font-size: 1.6rem; font-weight: 700;
    color: var(--color-gold);
    padding: .8rem 1rem;
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    margin-bottom: 1rem;
    letter-spacing: .04em;
  }
  .captcha-input {
    width: 100%;
    padding: .8rem 1rem;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    color: var(--color-text);
    font-family: var(--font-body);
    font-size: 1rem;
    text-align: center;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .captcha-input:focus {
    border-color: var(--color-gold);
    box-shadow: var(--shadow-gold);
  }
  .captcha-actions {
    display: flex; gap: .6rem; justify-content: center;
    margin-top: 1.2rem;
  }
  .captcha-error {
    color: var(--color-danger);
    font-size: .88rem;
    margin-top: .6rem;
    min-height: 1.2em;
  }
  </style>

/* ============================================================
   LANGUE â dÃ©tection + sÃ©lecteur + persistance
   ============================================================ */
const LANG_KEY = 'chr-help-lang';
function detectLang(){
  try {
    const saved = localStorage.getItem(LANG_KEY);
    if (saved === 'fr' || saved === 'en') return saved;
  } catch(e){}
  const nav = (navigator.language || 'fr').toLowerCase();
  return nav.startsWith('en') ? 'en' : 'fr';
}
let currentLang = detectLang();

function t(key, ...args){
  const v = I18N[currentLang][key];
  return typeof v === 'function' ? v(...args) : v;
}

function setLang(lang){
  if (lang !== 'fr' && lang !== 'en') return;
  currentLang = lang;
  try { localStorage.setItem(LANG_KEY, lang); } catch(e){}
  document.documentElement.setAttribute('lang', lang);
  renderLangSwitcher();
  renderHeroStatic();
  route();
}

function renderLangSwitcher(){
  const $ls = document.getElementById('langSwitcher');
  $ls.innerHTML = `
    <button data-lang="fr" class="${currentLang==='fr'?'active':''}" aria-label="FranÃ§ais"><span class="flag">ð«ð·</span> FR</button>
    <button data-lang="en" class="${currentLang==='en'?'active':''}" aria-label="English"><span class="flag">ð¬ð§</span> EN</button>
  `;
  $ls.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', e => setLang(btn.dataset.lang));
  });
}

function renderHeroStatic(){
  document.getElementById('heroEyebrow').textContent = t('eyebrow');
  document.getElementById('heroTitle').textContent = t('heroTitle');
  document.getElementById('heroSubtitle').textContent = t('heroSubtitle');
  document.getElementById('search').placeholder = t('searchPlaceholder');
  const backEl = document.querySelector('#backHome span');
  if (backEl) backEl.textContent = t('backHome');
}

/* ============================================================
   ROUTEUR + RENDU
   ============================================================ */
const $app = document.getElementById('app');
const $hero = document.getElementById('hero');

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}

function articlesByCat(catId){return ARTICLES.filter(a=>a.cat===catId)}
function catById(id){return CATEGORIES.find(c=>c.id===id)}
function articleById(id){return ARTICLES.find(a=>a.id===id)}

function renderHome(){
  $hero.classList.remove('compact');
  const cats = CATEGORIES.map(c=>{
    const n = articlesByCat(c.id).length;
    return `
      <a class="cat-card" href="#/c/${c.id}">
        <div class="cat-icon ${c.iconCls}">${c.icon}</div>
        <h3>${escapeHtml(c.titles[currentLang])}</h3>
        <p>${escapeHtml(c.descs[currentLang])}</p>
        <div class="count">${t('articlesCount', n)}</div>
      </a>`;
  }).join('');

  $app.className = 'container overlap';
  $app.innerHTML = `
    <div class="cat-grid">${cats}</div>
    <div class="contact-cta">
      <div>
        <h3>${t('ctaHomeTitle')}</h3>
        <p>${t('ctaHomeText')}</p>
      </div>
      <a class="btn" href="#" onclick="chrOpenSupport(event)">${t('ctaBtn')}</a>
    </div>`;
  window.scrollTo({top:0,behavior:'instant'});
}

function renderCategory(catId){
  const cat = catById(catId);
  if(!cat){ location.hash='#/'; return; }
  $hero.classList.add('compact');
  const arts = articlesByCat(catId);

  const list = arts.length ? arts.map((a,i)=>`
    <a href="#/a/${a.id}">
      <div class="art-num">${i+1}</div>
      <div class="art-body">
        <strong>${escapeHtml(a.titles[currentLang])} ${a.badge?`<span class="badge ${a.badge}">${a.badge==='admin'?t('adminBadge'):t('soonBadge')}</span>`:''}</strong>
        <p>${escapeHtml(a.summaries[currentLang])} Â· ${t('readTime', a.readTime)}</p>
      </div>
      <span class="art-arrow">âº</span>
    </a>`).join('') : `<div style="padding:28px;text-align:center;color:var(--muted)">${t('noArticles')}</div>`;

  $app.className = 'container';
  $app.innerHTML = `
    <div class="cat-header">
      <div class="breadcrumb"><a href="#/">${t('home')}</a><span class="sep">âº</span> ${escapeHtml(cat.titles[currentLang])}</div>
      <h1>${escapeHtml(cat.titles[currentLang])}</h1>
      <p>${escapeHtml(cat.descs[currentLang])}</p>
    </div>
    <div class="article-list">${list}</div>
    <div class="contact-cta">
      <div>
        <h3>${t('ctaCatTitle')}</h3>
        <p>${t('ctaCatText')}</p>
      </div>
      <a class="btn outline" href="#" onclick="chrOpenSupport(event)">${t('ctaBtn')}</a>
    </div>`;
  window.scrollTo({top:0,behavior:'instant'});
}

function renderArticle(artId){
  const art = articleById(artId);
  if(!art){ location.hash='#/'; return; }
  $hero.classList.add('compact');
  const cat = catById(art.cat);
  const siblings = articlesByCat(art.cat);
  const idx = siblings.findIndex(a=>a.id===art.id);
  const prev = siblings[idx-1]; const next = siblings[idx+1];

  const related = siblings.filter(a=>a.id!==art.id).slice(0,4);

  const sideNav = `
    <div class="side-nav">
      <h4>${escapeHtml(cat.titles[currentLang])}</h4>
      <ul>
        ${siblings.map(a=>`
          <li><a class="${a.id===art.id?'active':''}" href="#/a/${a.id}">${escapeHtml(a.titles[currentLang])}</a></li>
        `).join('')}
      </ul>
    </div>`;

  const nav = (prev||next) ? `
    <div style="display:flex;justify-content:space-between;gap:12px;margin-top:28px">
      ${prev?`<a class="btn outline" href="#/a/${prev.id}">â ${escapeHtml(prev.titles[currentLang])}</a>`:'<span></span>'}
      ${next?`<a class="btn outline" href="#/a/${next.id}">${escapeHtml(next.titles[currentLang])} â</a>`:'<span></span>'}
    </div>` : '';

  const relatedHtml = related.length ? `
    <div class="related">
      <h4>${t('relatedTitle')}</h4>
      <div class="related-grid">
        ${related.map(a=>`
          <a href="#/a/${a.id}">
            <strong>${escapeHtml(a.titles[currentLang])}</strong><br>
            <small style="color:var(--muted)">${escapeHtml(a.summaries[currentLang])}</small>
          </a>`).join('')}
      </div>
    </div>` : '';

  $app.className = 'container';
  $app.innerHTML = `
    <div class="article-layout">
      ${sideNav}
      <article class="article">
        <div class="breadcrumb">
          <a href="#/">${t('home')}</a><span class="sep">âº</span>
          <a href="#/c/${cat.id}">${escapeHtml(cat.titles[currentLang])}</a><span class="sep">âº</span>
          ${escapeHtml(art.titles[currentLang])}
        </div>
        <h1>${escapeHtml(art.titles[currentLang])}</h1>
        <div class="meta">
          <span><svg width="14" height="14"><use href="#i-clock"/></svg> ${t('readTime', art.readTime)}</span>
          <span><svg width="14" height="14"><use href="#i-folder"/></svg> ${escapeHtml(cat.titles[currentLang])}</span>
          ${art.badge?`<span class="badge ${art.badge}">${art.badge==='admin'?t('adminBadge'):t('soonBadge')}</span>`:''}
        </div>
        ${art.bodies[currentLang]}
        ${nav}
        ${relatedHtml}
      </article>
    </div>`;
  window.scrollTo({top:0,behavior:'instant'});
}

function route(){
  const h = location.hash || '#/';
  const parts = h.replace(/^#\//,'').split('/').filter(Boolean);
  if(parts.length===0) return renderHome();
  if(parts[0]==='c' && parts[1]) return renderCategory(parts[1]);
  if(parts[0]==='a' && parts[1]) return renderArticle(parts[1]);
  return renderHome();
}

window.addEventListener('hashchange', route);

/* Deep-link depuis Bubble */
window.addEventListener('message', e=>{
  if(!e.data || typeof e.data !== 'object') return;
  if(e.data.chrHelp === 'goto'){
    if(e.data.lang && (e.data.lang==='fr' || e.data.lang==='en')){
      setLang(e.data.lang);
    }
    if(e.data.article) location.hash = '#/a/' + e.data.article;
    else if(e.data.category) location.hash = '#/c/' + e.data.category;
    else location.hash = '#/';
  }
});

/* Search */
const $search = document.getElementById('search');
const $results = document.getElementById('searchResults');

function runSearch(q){
  const query = q.trim().toLowerCase();
  if(query.length<2){ $results.classList.remove('open'); $results.innerHTML=''; return; }
  const matches = ARTICLES.filter(a => {
    const txt = (a.titles[currentLang] + ' ' + a.summaries[currentLang] + ' ' + a.bodies[currentLang]).toLowerCase();
    return txt.includes(query);
  }).slice(0,10);
  if(matches.length===0){
    $results.innerHTML = `<div class="empty">${t('searchEmpty')}</div>`;
  } else {
    $results.innerHTML = matches.map(a=>`
      <a class="item" href="#/a/${a.id}">
        <strong>${escapeHtml(a.titles[currentLang])}</strong>
        <span>${escapeHtml(catById(a.cat).titles[currentLang])} Â· ${escapeHtml(a.summaries[currentLang])}</span>
      </a>`).join('');
  }
  $results.classList.add('open');
}

$search.addEventListener('input', e=>runSearch(e.target.value));
$search.addEventListener('focus', e=>{ if(e.target.value.trim().length>=2) $results.classList.add('open'); });
document.addEventListener('click', e=>{
  if(!e.target.closest('.search-wrap')) $results.classList.remove('open');
});
$results.addEventListener('click', ()=>{
  $results.classList.remove('open');
  setTimeout(()=>{ $search.value=''; }, 150);
});

/* Init */

// DÃ©tecter le mode embedded : si on est dans une iframe (popup Bubble ou
// n'importe quel embed), on masque le hero et on garde juste la barre de recherche.
try {
  if (window.self !== window.top) {
    document.body.classList.add('embedded');
  }
} catch (e) {
  // Cross-origin access exception = on est dans une iframe
  document.body.classList.add('embedded');
}

renderLangSwitcher();
renderHeroStatic();
route();

/* ============================================================
   Captcha anti-spam pour le bouton "Contacter le support"
   L'email n'est jamais dans le HTML statique (obfuscation scrapers)
   + petit calcul Ã  rÃ©soudre avant d'ouvrir mailto:.
   ============================================================ */
(function(){
  let a=0, b=0;
  function mount(){
    if(document.getElementById('chrCaptchaBackdrop')) return;
    const html = '<div class="captcha-backdrop hidden" id="chrCaptchaBackdrop" role="dialog" aria-modal="true" aria-labelledby="chrCaptchaTitle">' +
      '<div class="captcha-modal">' +
        '<h3 id="chrCaptchaTitle"></h3>' +
        '<p class="hint" id="chrCaptchaHint"></p>' +
        '<div class="captcha-question" id="chrCaptchaQuestion"></div>' +
        '<input type="number" inputmode="numeric" class="captcha-input" id="chrCaptchaInput" aria-label="Answer" autocomplete="off">' +
        '<p class="captcha-error" id="chrCaptchaError"></p>' +
        '<div class="captcha-actions">' +
          '<button class="btn outline" type="button" id="chrCaptchaCancel"></button>' +
          '<button class="btn" type="button" id="chrCaptchaSubmit"></button>' +
        '</div>' +
      '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
    document.getElementById('chrCaptchaCancel').addEventListener('click', close);
    document.getElementById('chrCaptchaSubmit').addEventListener('click', verify);
    document.getElementById('chrCaptchaInput').addEventListener('keydown', e => {
      if(e.key === 'Enter'){ e.preventDefault(); verify(); }
      if(e.key === 'Escape'){ close(); }
    });
    document.getElementById('chrCaptchaBackdrop').addEventListener('click', e => {
      if(e.target.id === 'chrCaptchaBackdrop') close();
    });
  }
  function open(){
    mount();
    a = Math.floor(Math.random()*8)+2;
    b = Math.floor(Math.random()*8)+2;
    document.getElementById('chrCaptchaTitle').textContent = t('captchaTitle');
    document.getElementById('chrCaptchaHint').textContent = t('captchaHint');
    document.getElementById('chrCaptchaQuestion').textContent = a + ' + ' + b + ' = ?';
    document.getElementById('chrCaptchaSubmit').textContent = t('captchaSubmit');
    document.getElementById('chrCaptchaCancel').textContent = t('captchaCancel');
    document.getElementById('chrCaptchaError').textContent = '';
    const input = document.getElementById('chrCaptchaInput');
    input.value = '';
    document.getElementById('chrCaptchaBackdrop').classList.remove('hidden');
    setTimeout(function(){ input.focus(); }, 50);
  }
  function close(){
    const bd = document.getElementById('chrCaptchaBackdrop');
    if(bd) bd.classList.add('hidden');
  }
  function openMailto(){
    const u = String.fromCharCode(115,117,112,112,111,114,116);
    const d = ['chrsolution','app'].join('.');
    window.open('mailto:' + u + '@' + d + '?subject=' + encodeURIComponent('[CHR Solution] Demande de support'), '_self');
  }
  function verify(){
    const val = parseInt(document.getElementById('chrCaptchaInput').value, 10);
    if(val === a + b){
      close();
      openMailto();
    } else {
      document.getElementById('chrCaptchaError').textContent = t('captchaError');
      const input = document.getElementById('chrCaptchaInput');
      input.value = '';
      input.focus();
    }
  }
  window.chrOpenSupport = function(e){
    if(e && e.preventDefault) e.preventDefault();
    // En iframe Bubble : user dÃ©jÃ  authentifiÃ©, on skip le captcha
    if(document.body.classList.contains('embedded')){
      openMailto();
      return;
    }
    open();
  };
})();
</script>
